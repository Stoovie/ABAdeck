<!doctype html>
<meta charset="utf-8">
<title>ABA Billing — The Seven Mistakes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;}
  #deck{position:fixed;inset:0;background:#000;}
  .chap{position:absolute;inset:0;border:0;width:100%;height:100%;opacity:0;pointer-events:none;transition:opacity .5s ease;}
  .chap.active{opacity:1;pointer-events:auto;}
  #cbar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:8px;z-index:50;
    background:rgba(0,0,0,.35);padding:8px 14px;border-radius:30px;backdrop-filter:blur(6px);}
  #cbar .seg{width:34px;height:5px;border-radius:3px;background:rgba(255,255,255,.16);transition:background .4s,box-shadow .4s;cursor:pointer;}
  #cbar .seg.done{background:rgba(47,125,91,.4);}
  #cbar .seg.active{background:#2F7D5B;box-shadow:0 0 12px rgba(47,125,91,.7);}
  #ctitle{position:fixed;left:0;right:0;bottom:34px;text-align:center;color:#9AA7B5;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;z-index:50;opacity:.7;pointer-events:none;}
  #hint{position:fixed;right:20px;top:16px;color:rgba(255,255,255,.3);font-size:11px;z-index:50;letter-spacing:.05em;}
</style>
<div id="deck"></div>
<div id="cbar"></div>
<div id="ctitle"></div>
<div id="hint">&rarr; advance &middot; &larr; back &middot; F fullscreen</div>

<script type="text/html" id="chap0"><meta charset="utf-8">
<!-- ABA — ONE continuous canvas. Persistent elements morph between states on each click. -->
<div id="frame"><div id="stage"></div></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --ink:#1E2730; --ink2:#161D25; --ink3:#0C1117;
    --paper:#F5F7FA; --gold:#2F7D5B; --teal:#3E6E8E; --papmut:#8A97A6; --rust:#B5524A;
    --head:'Roboto Slab', Georgia, serif; --body:'Inter', system-ui, sans-serif;
    --ease:cubic-bezier(.45,.05,.2,1);
    --dur:.85s;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#000; overflow:hidden; }
  #frame{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
  #stage{ position:relative; width:1280px; height:720px; overflow:hidden; flex:none; font-family:var(--body);
    transform-origin:center center;
    background:
      radial-gradient(130% 100% at 80% 22%, rgba(47,125,91,.12), transparent 52%),
      radial-gradient(110% 130% at 5% 105%, rgba(62,110,142,.16), transparent 60%),
      linear-gradient(150deg, var(--ink) 0%, var(--ink2) 55%, var(--ink3) 100%);
  }
  #stage::after{ content:''; position:absolute; inset:0; pointer-events:none;
    box-shadow:inset 0 0 170px 50px rgba(0,0,0,.5); z-index:0; }

  /* every persistent element is absolutely placed and transitions ALL geometry */
  .el{ position:absolute; transition:
      left var(--dur) var(--ease), top var(--dur) var(--ease),
      width var(--dur) var(--ease), height var(--dur) var(--ease),
      font-size var(--dur) var(--ease), opacity .6s ease, color .5s ease,
      transform var(--dur) var(--ease), letter-spacing var(--dur) var(--ease);
    will-change:left,top,font-size,opacity; }

  /* the eyebrow / kicker */
  #eyebrow{ font-weight:700; letter-spacing:.4em; text-transform:uppercase; white-space:nowrap;
    display:flex; align-items:center; z-index:5; }
  #eyebrow .line{ display:inline-block; width:42px; height:2px; margin-right:16px; flex:none;
    transition:background .5s, box-shadow .5s, width var(--dur) var(--ease); }

  /* the BIG number — travels from center-stage hero to ghost-right */
  #bignum{ font-family:var(--head); font-weight:900; line-height:.74; font-variant-numeric:tabular-nums;
    z-index:1; text-align:right; pointer-events:none; }

  /* the TITLE — morphs from map label to mistake headline */
  #title{ font-family:var(--head); font-weight:800; line-height:1.05; letter-spacing:-.015em;
    color:var(--paper); z-index:4; }

  /* the small label above title (MISTAKE 0X) */
  #label{ font-family:var(--head); font-weight:800; letter-spacing:.06em; z-index:4; }

  /* money figure (lives off-stage until mistake) */
  #money{ font-family:var(--head); font-weight:900; line-height:.9; color:var(--gold);
    text-shadow:0 0 60px rgba(47,125,91,.5); font-variant-numeric:tabular-nums; letter-spacing:-.02em;
    text-align:right; z-index:3; }
  #moneycap{ font-family:var(--body); font-weight:500; color:var(--papmut); text-align:right;
    line-height:1.4; z-index:3; }

  /* story + info (enter on later mistake states) */
  #story{ z-index:4; width:780px; }
  #story .w{ font-weight:700; font-size:18px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin-bottom:18px; }
  #story .t{ font-family:var(--head); font-weight:700; color:var(--paper); opacity:.95; font-size:27px; line-height:1.4; }
  #story .t b{ font-weight:900; color:#fff; }
  #story .t .hl{ font-weight:900; color:var(--gold); }
  #info{ z-index:4; display:flex; gap:18px; align-items:flex-start; width:980px; }
  #info .dot{ flex:none; width:40px; height:40px; border-radius:50%; background:rgba(47,125,91,.14);
    border:1px solid rgba(47,125,91,.4); display:flex; align-items:center; justify-content:center;
    color:var(--gold); font-family:var(--head); font-weight:800; font-style:italic; font-size:22px; }
  #info .it{ font-style:italic; color:var(--papmut); line-height:1.5; padding-top:6px; font-size:20px; }

  /* fix line (the resolution) + supporting detail */
  #fixline{ font-family:var(--head); font-weight:800; line-height:1.15; letter-spacing:-.01em;
    color:var(--paper); z-index:4; width:740px; }
  #fixsub{ z-index:4; width:680px; color:#B9C9C7; line-height:1.5; }
  #fixsub b{ color:var(--paper); font-weight:700; }

  /* the math breakdown: factors with a "why" label under each */
  #mathrow{ z-index:4; display:flex; align-items:flex-start; gap:22px; }
  #mathrow .factor{ display:flex; flex-direction:column; align-items:center; text-align:center;
    opacity:0; transform:translateY(10px); transition:opacity .45s var(--ease), transform .45s var(--ease); }
  #mathrow .factor.in{ opacity:1; transform:none; }
  #mathrow .val{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--paper); line-height:1; }
  #mathrow .why{ font-family:var(--body); font-weight:500; font-size:14px; color:var(--papmut);
    margin-top:10px; max-width:150px; line-height:1.35; }
  #mathrow .op{ font-family:var(--head); font-weight:700; font-size:34px; color:var(--gold); padding-top:2px;
    opacity:0; transition:opacity .4s; }
  #mathrow .op.in{ opacity:.85; }
  #mathrow .eqval{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--gold);
    line-height:1; text-shadow:0 0 20px rgba(47,125,91,.4); }

  /* four outcomes: 2x2, good ones calm, bad ones heavier with glow */
  #outcomes{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  #outcomes .oc{ border-radius:14px; padding:18px 24px; position:relative;
    opacity:0; transform:translateY(16px); transition:opacity .5s var(--ease), transform .5s var(--ease);
    background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); }
  #outcomes .oc.in{ opacity:1; transform:none; }
  #outcomes .oc.bad{ background:rgba(181,82,74,.10); border-color:rgba(181,82,74,.45);
    box-shadow:0 0 30px rgba(181,82,74,.12); }
  #outcomes .oc .tag{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--papmut); margin-bottom:8px; }
  #outcomes .oc.bad .tag{ color:var(--rust); }
  #outcomes .oc.good .tag{ color:var(--teal); }
  #outcomes .oc .h{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper);
    line-height:1.1; margin-bottom:8px; }
  #outcomes .oc .d{ font-size:15px; line-height:1.4; color:var(--papmut); }
  #outcomes .oc .amt{ color:var(--rust); font-weight:700; }

  /* hours increase visual: two bars, before (2hr) and after (4hr, gold, taller) */
  #hoursviz{ display:flex; align-items:flex-end; gap:34px; z-index:4; }
  #hoursviz .col{ display:flex; flex-direction:column; align-items:center; }
  #hoursviz .bar{ width:90px; border-radius:10px 10px 4px 4px; transition:height .7s var(--ease); }
  #hoursviz .before .bar{ height:110px; background:rgba(255,255,255,.16); }
  #hoursviz .after .bar{ height:220px; background:linear-gradient(180deg,var(--gold),#1F5B40);
    box-shadow:0 0 40px rgba(47,125,91,.35); }
  #hoursviz .num{ font-family:var(--head); font-weight:900; font-size:40px; line-height:1; margin-bottom:14px; }
  #hoursviz .before .num{ color:var(--papmut); }
  #hoursviz .after .num{ color:var(--gold); }
  #hoursviz .cap{ font-family:var(--body); font-weight:600; font-size:14px; color:var(--papmut);
    margin-top:14px; letter-spacing:.04em; }
  #hoursviz .arrow{ align-self:center; font-family:var(--head); font-weight:800; font-size:40px;
    color:var(--rust); padding-bottom:80px; }

  /* depletion race: same unit pool, two bars draining at different rates */
  #burndown{ z-index:4; width:1000px; }
  #burndown .row{ margin-bottom:34px; }
  #burndown .rl{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  #burndown .rl .name{ font-family:var(--head); font-weight:700; font-size:22px; color:var(--paper); }
  #burndown .rl .name b{ color:var(--gold); }
  #burndown .rl .out{ font-family:var(--body); font-weight:600; font-size:15px; color:var(--papmut); }
  #burndown .rl .out.danger{ color:var(--rust); font-weight:700; }
  /* the track = full 6-month pool */
  #burndown .track{ position:relative; height:30px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; }
  /* the fill = units consumed, drains across */
  #burndown .fill{ position:absolute; left:0; top:0; bottom:0; border-radius:8px 0 0 8px;
    transition:width 1.1s var(--ease); }
  #burndown .fill.slow{ background:linear-gradient(90deg,var(--teal),#1f5f5b); width:0; }
  #burndown .fill.fast{ background:linear-gradient(90deg,var(--gold),#1F5B40); width:0;
    box-shadow:0 0 24px rgba(47,125,91,.3); }
  /* the uncovered zone on the fast track (month 3→6) */
  #burndown .uncovered{ position:absolute; top:0; bottom:0; right:0; width:50%;
    background:repeating-linear-gradient(45deg, rgba(181,82,74,.16) 0 8px, transparent 8px 16px);
    border-left:2px dashed rgba(181,82,74,.6); opacity:0; transition:opacity .5s ease .6s; }
  #burndown .uncovered.show{ opacity:1; }
  #burndown .uncovered .ulab{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--rust); white-space:nowrap; }
  /* month axis */
  #burndown .axis{ display:flex; justify-content:space-between; margin-top:8px;
    font-family:var(--body); font-size:13px; color:var(--papmut); opacity:.6; }

  /* money flow: pays RBT (out) vs reimbursement (denied) → lost revenue if not caught */
  #moneyflow{ z-index:4; width:1080px; }
  #moneyflow .step{ display:flex; align-items:center; gap:22px; margin-bottom:26px;
    opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #moneyflow .step.in{ opacity:1; transform:none; }
  #moneyflow .node{ flex:none; min-width:200px; padding:18px 22px; border-radius:12px; text-align:center;
    font-family:var(--head); font-weight:700; font-size:21px; color:var(--paper);
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
  #moneyflow .flow{ font-family:var(--head); font-weight:800; font-size:26px; white-space:nowrap; }
  #moneyflow .amt{ font-family:var(--head); font-weight:900; font-size:30px; font-variant-numeric:tabular-nums; }
  #moneyflow .desc{ font-family:var(--body); font-weight:500; font-size:17px; line-height:1.4; color:var(--papmut); }
  /* out = money leaving, certain (teal) */
  #moneyflow .out .flow{ color:var(--teal); }
  #moneyflow .out .amt{ color:var(--paper); }
  /* back = reimbursement blocked (rust) */
  #moneyflow .back .flow{ color:var(--rust); }
  #moneyflow .back .amt{ color:var(--rust); }
  #moneyflow .back .node.denied{ border-color:rgba(181,82,74,.5); background:rgba(181,82,74,.1);
    color:var(--rust); position:relative; }
  /* the lost total */
  #moneyflow .lost{ margin-top:8px; padding-top:22px; border-top:1px solid rgba(255,255,255,.1);
    display:flex; align-items:baseline; gap:16px;
    opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #moneyflow .lost.in{ opacity:1; transform:none; }
  #moneyflow .lost .lt{ font-family:var(--body); font-weight:600; font-size:19px; color:var(--papmut); }
  #moneyflow .lost .lv{ font-family:var(--head); font-weight:900; font-size:48px; color:var(--gold);
    text-shadow:0 0 30px rgba(47,125,91,.4); }
  #moneyflow .lost .cond{ font-family:var(--body); font-weight:600; font-size:16px; font-style:italic;
    color:var(--rust); }

  /* progress ticks (persist across the whole map→mistakes journey) */
  #ticks{ position:absolute; left:90px; bottom:74px; display:flex; gap:16px; align-items:center; z-index:5; }
  .tick{ width:60px; height:5px; border-radius:3px; background:rgba(255,255,255,.13);
    transition:background .5s, box-shadow .5s, transform .4s; }
  .tick.done{ background:rgba(47,125,91,.38); }
  .tick.active{ background:var(--gold); box-shadow:0 0 16px rgba(47,125,91,.7); transform:scaleY(1.8); }

  #counter{ position:absolute; right:90px; bottom:70px; font-family:var(--head); font-weight:700;
    font-size:19px; color:var(--papmut); z-index:5; letter-spacing:.06em; opacity:.75; }
  #hint{ position:absolute; bottom:30px; left:90px; font-size:13px; color:var(--papmut); opacity:.4; z-index:5; }
  #click{ position:absolute; inset:0; z-index:6; cursor:pointer; }
  .hidden{ opacity:0 !important; }
</style>

<script>
(function(){
  const stage=document.getElementById('stage'), frame=document.getElementById('frame');
  function fit(){ const s=Math.min(window.innerWidth/1280, window.innerHeight/720); stage.style.transform='scale('+s+')'; }
  window.addEventListener('resize',fit); fit();

  const items=[
    "Not staying on top of authorized units","Not reworking denied claims","Ignoring aging claims",
    "Not tying sessions to claims","Not keeping a record on every claim","Not fixing denials at the source",
    "Notes that don't match the claims"
  ];
  const M1={ money:"$10,400", drain:10400, cap:"in unauthorized services on a single client",
    story:"A BCBA bumps a kid from <span class='hl'>2 to 4 hours a day</span> mid-authorization. Good clinical call — but that's <b>10 extra hours a week</b> the auth was never built to cover.",
    info:"Insurance approves a set number of <b>15-minute units</b> across the whole authorization period — usually about six months. <span class='hl'>Once it's used up, anything past it isn't covered.</span>",
    mechHead:"What an authorization actually is",
    fix:"Going to 4 hours isn't the mistake — going to 4 hours without updating the auth is.",
    fixsub:"The second a client's hours change, <b>amend the authorization</b>. Track units used against how much of the period is left — so nobody blows through an auth without seeing it coming.",
    outcomes:[
      {tone:'good', tag:'1 · Fine', h:'Claims just get paid', d:"No issue, everything's fine. Sometimes that's how it goes."},
      {tone:'good', tag:'2 · Caught fast', h:'Denied, but caught', d:"Hours come back down or the auth gets fixed. Nothing lost."},
      {tone:'bad', tag:'3 · Eaten', h:'Nobody catches it', d:'The extra hours never get covered. The company quietly eats <span class="amt">~$10K</span> on one client.'},
      {tone:'bad', tag:'4 · Clawed back', h:'Paid, then recouped', d:'Months later insurance takes it back — <span class="amt">$10K</span> clawed back long after it hit payroll.'}
    ],
    takeaway:"Track your units — running out can quietly cost you real revenue.",
    takeawaySub:"One client is <b>$10K</b>. Across a caseload, untracked units are one of the biggest silent losses an ABA company carries." };
  const pad=n=>String(n).padStart(2,'0');

  // build persistent elements ONCE
  stage.insertAdjacentHTML('beforeend',`
    <div class="el" id="eyebrow"><span class="line"></span><span class="ebtext"></span></div>
    <div class="el" id="bignum">1</div>
    <div class="el" id="label"></div>
    <div class="el" id="title"></div>
    <div class="el" id="money"></div>
    <div class="el" id="moneycap"></div>
    <div class="el" id="story"><div class="w">What happens</div><div class="t"></div></div>
    <div class="el" id="info"><div class="dot">i</div><div class="it"></div></div>
    <div class="el" id="fixline"></div>
    <div class="el" id="fixsub"></div>
    <div class="el" id="mathrow"></div>
    <div class="el" id="outcomes"></div>
    <div class="el" id="hoursviz"></div>
    <div class="el" id="burndown"></div>
    <div class="el" id="moneyflow"></div>
    <div id="ticks">${items.map((_,i)=>`<div class="tick" data-i="${i}"></div>`).join('')}</div>
    <div id="counter">01 / 07</div>
    <div id="hint">&rarr; advance &middot; &larr; back &middot; F fullscreen</div>
    <div id="click"></div>`);

  const E={ eyebrow:el('eyebrow'), ebtext:stage.querySelector('.ebtext'), ebline:stage.querySelector('#eyebrow .line'),
    bignum:el('bignum'), label:el('label'), title:el('title'), money:el('money'), moneycap:el('moneycap'),
    story:el('story'), storyt:stage.querySelector('#story .t'), info:el('info'), infot:stage.querySelector('#info .it'),
    fixline:el('fixline'), fixsub:el('fixsub'), mathrow:el('mathrow'), outcomes:el('outcomes'), hoursviz:el('hoursviz'), burndown:el('burndown'), moneyflow:el('moneyflow'),
    ticks:[...stage.querySelectorAll('.tick')], counter:el('counter') };
  function el(id){ return document.getElementById(id); }

  // set helper: apply geometry/style to an element
  function S(node, p){ for(const k in p){ if(k==='text'){ node.textContent=p.text; }
    else if(k==='html'){ node.innerHTML=p.html; } else node.style[k]=p[k]; } }
  function px(n){ return n+'px'; }

  // ----- STATE DEFINITIONS -----
  // Each state is a function that POSITIONS every persistent element for that moment.
  // Elements transition from their previous state to this one = continuous morph.

  function setTicks(activeIdx){ E.ticks.forEach((t,j)=>{ t.classList.remove('active','done');
    if(activeIdx>=0){ if(j<activeIdx)t.classList.add('done'); if(j===activeIdx)t.classList.add('active'); } }); }

  // PROTOTYPE PATH: state0 = map showing mistake 1, then dive into mistake 1's beats.
  const states=[];
  states.push(mapState(0)); // map, focused on mistake 1

  // Hide every CONTENT element. Each state calls this first, then shows only what it needs.
  // Elements keep their last position while hidden, so showing them again still morphs.
  function resetAll(){
    [E.bignum,E.label,E.title,E.money,E.moneycap,E.story,E.info,E.fixline,E.fixsub,E.mathrow,E.outcomes,E.hoursviz,E.burndown,E.moneyflow]
      .forEach(n=>{ n.style.opacity='0'; });
  }
  // assert the rust "THE MISTAKE" eyebrow (used by all mistake-phase states)
  function mistakeEyebrow(){
    S(E.ebtext,{text:'The Mistake · 01'}); E.ebtext.style.color='var(--rust)';
    E.ebline.style.background='var(--rust)'; E.ebline.style.boxShadow='0 0 12px var(--rust)';
    S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)}); E.eyebrow.style.opacity=.95;
  }

  // map state for mistake i (0-based)
  function mapState(i){
    return ()=>{
      resetAll();
      E.eyebrow.style.opacity=1;
      S(E.ebtext,{text:'The Map · Seven mistakes, one rhythm'});
      E.ebtext.style.color='var(--gold)'; E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
      S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)});

      // big number = ghost on the right, dim
      S(E.bignum,{ text:String(i+1), left:px(760), top:px(150), width:px(490), height:px(440),
        fontSize:px(440), color:'var(--gold)', opacity:.12, transform:'none' });
      E.bignum.style.textAlign='right';

      // label (MISTAKE 0X) sits above the morphing title, gold
      S(E.label,{ text:'MISTAKE '+pad(i+1), left:px(90), top:px(296), width:px(600), fontSize:px(23),
        color:'var(--gold)', opacity:1 });

      // TITLE = the mistake text, centered-left, big
      S(E.title,{ text:items[i], left:px(90), top:px(330), width:px(720), fontSize:px(62), opacity:1, color:'var(--paper)' });

      // money + story + info parked off-state (invisible, positioned where they'll enter from)
      S(E.money,{ opacity:0, left:px(820), top:px(250), width:px(380), fontSize:px(130) });
      S(E.moneycap,{ opacity:0, left:px(820), top:px(400), width:px(380), fontSize:px(20) });
      S(E.story,{ opacity:0, left:px(90), top:px(470), fontSize:px(23) });
      S(E.info,{ opacity:0, left:px(90), top:px(560) });
      S(E.fixline,{ opacity:0, left:px(90), top:px(330), fontSize:px(52) });
      S(E.fixsub,{ opacity:0, left:px(90), top:px(560), fontSize:px(21) });
      S(E.mathrow,{ opacity:0 });

      setTicks(i); E.counter.textContent=pad(i+1)+' / 07'; E.counter.style.opacity=.75;
      E.ticks.forEach(t=>t.style.opacity=1); E.counter.style.opacity=.75;
    };
  }
  // ---- DIVE into mistake 1: ONE THING AT A TIME, each owns the frame ----

  // State A — THE STORY owns the whole frame. Big, centered. Visual cue (2 → 4 hrs) on the right.
  states.push(()=>{
    resetAll();
    // eyebrow → rust "THE MISTAKE"
    S(E.ebtext,{text:'The Mistake · 01'}); E.ebtext.style.color='var(--rust)';
    E.ebline.style.background='var(--rust)'; E.ebline.style.boxShadow='0 0 12px var(--rust)';
    S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)}); E.eyebrow.style.opacity=.95;

    // ghost number hidden — hours visual occupies the right
    S(E.bignum,{ text:'1', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:0 });

    // map label/title clear out
    S(E.label,{ opacity:0 });
    S(E.title,{ opacity:0, top:px(120) });

    // STORY = the hero. Left side; hours visual on the right.
    S(E.storyt,{ html:M1.story });
    const w=stage.querySelector('#story .w'); if(w) w.style.opacity='0';
    S(E.story,{ opacity:1, left:px(90), top:px(250), width:px(720), fontSize:px(38) });
    E.storyt.style.fontSize='38px'; E.storyt.style.lineHeight='1.35';

    // hours-increase visual on the right
    buildHoursViz();
    S(E.hoursviz,{ opacity:1, left:px(870), top:px(300), width:px(360) });
    S(E.money,{ opacity:0 });
    S(E.moneycap,{ opacity:0 });
    S(E.info,{ opacity:0 });
    setTicks(0); E.counter.textContent='01 / 07';
  });

  // State A2 — THE MECHANISM. What an authorization actually is, and why the overage isn't covered.
  states.push(()=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'1', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.06 });
    // small gold headline
    S(E.label,{ html:M1.mechHead, left:px(90), top:px(190), width:px(760), fontSize:px(24), color:'var(--gold)', opacity:1 });
    // the mechanism, big, owning the frame (reuse story element)
    S(E.storyt,{ html:M1.info });
    const w=stage.querySelector('#story .w'); if(w) w.style.opacity='0';
    S(E.story,{ opacity:1, left:px(90), top:px(270), width:px(960), fontSize:px(40) });
    E.storyt.style.fontSize='42px'; E.storyt.style.lineHeight='1.32';
  });

  // State A3 — THE DEPLETION RACE. Same unit pool; 4 hrs/day drains it twice as fast.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'1', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    // headline
    S(E.label,{ html:'Same pool of units &mdash; double the burn rate', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    // the depletion race
    buildBurndown();
    S(E.burndown,{ opacity:1, left:px(90), top:px(250), width:px(1000) });
    runBurndown(forward);
  });

  // State A4 — WHY IT'S LOST. Company pays the RBT (out); insurance denies (nothing back);
  // if the denials aren't caught, that's lost revenue.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'1', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'Why that money is gone', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    buildMoneyflow();
    S(E.moneyflow,{ opacity:1, left:px(90), top:px(240), width:px(1080) });
    if(forward){
      setFlowShown(0);
      later(()=>setFlowShown(1), 250);
      later(()=>setFlowShown(2), 1300);
      later(()=>setFlowShown(3), 2400);
    } else {
      setFlowShown(3);
    }
  });

  // State B — THE COST owns the frame. Story clears, $10,400 takes center, counts up.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.story,{ opacity:0, top:px(180) });
    S(E.label,{ opacity:0 });
    // money becomes the hero, large and centered
    S(E.money,{ left:px(330), top:px(220), width:px(620), fontSize:px(150), opacity:1 });
    E.money.style.textAlign='center';
    S(E.moneycap,{ text:M1.cap, left:px(330), top:px(410), width:px(620), fontSize:px(24), opacity:1 });
    E.moneycap.style.textAlign='center';
    S(E.bignum,{ opacity:.08 });
    S(E.mathrow,{ opacity:0 });
    buildMath();
    setMathShown(0);
    if(forward){ E.money.textContent='$0'; countUp(E.money, M1.drain); }
    else { E.money.textContent=M1.money; }   // arriving from ahead → just show final
  });

  // State B2 — THE MATH. The figure lifts up; the breakdown builds beneath, factor by factor.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ opacity:.08 });
    E.money.textContent=M1.money;            // ensure final figure regardless of direction
    S(E.money,{ left:px(330), top:px(150), width:px(620), fontSize:px(110), opacity:1 });
    E.money.style.textAlign='center';
    S(E.moneycap,{ opacity:0 });
    S(E.mathrow,{ opacity:1, left:px(220), top:px(360), width:px(840) });
    if(forward){
      setMathShown(1);
      later(()=>setMathShown(2), 650);
      later(()=>setMathShown(3), 1300);
      later(()=>setMathShown(4), 1950);
    } else {
      setMathShown(4);                       // arriving from ahead → show full math instantly
    }
  });

  // State B3 — THE FOUR OUTCOMES. "That $10,400 plays out four ways." Cards build one by one.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    buildOutcomes();
    // keep the cost docked small top-right as the thing-at-stake
    E.money.textContent=M1.money;
    S(E.money,{ left:px(820), top:px(96), width:px(380), fontSize:px(60), opacity:1 });
    E.money.style.textAlign='right';
    S(E.bignum,{ opacity:.05 });
    // header line (reuse title element as the framing question)
    S(E.title,{ html:'One overage.<br><span style="color:var(--rust)">Four endings.</span>', left:px(90), top:px(150), width:px(620), fontSize:px(48), opacity:1, color:'var(--paper)' });
    // outcomes grid, lower-left/center
    S(E.outcomes,{ opacity:1, left:px(90), top:px(310), width:px(1110) });
    if(forward){
      setOutcomesShown(0);
      later(()=>setOutcomesShown(1), 250);
      later(()=>setOutcomesShown(2), 1000);
      later(()=>setOutcomesShown(3), 1750);
      later(()=>setOutcomesShown(4), 2600);
    } else {
      setOutcomesShown(4);
    }
  });

  // ---- THE FIX (the turn: rust→gold). Just the fix line, owning the frame. ----
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 01'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'1', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    // FIX line lands big, centered vertically — the only thing on screen
    S(E.fixline,{ html:M1.fix, opacity:1, left:px(90), top:px(280), width:px(820), fontSize:px(54) });
    S(E.fixsub,{ opacity:0, top:px(560) });
  });

  // Fix detail: fix line settles up, the how-to rises right beneath it (tight, connected).
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 01'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'1', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    S(E.fixline,{ html:M1.fix, opacity:1, left:px(90), top:px(200), width:px(820), fontSize:px(46) });
    // small gold "DO THIS" label ties the how-to to the fix
    S(E.label,{ html:'How to actually do it', left:px(90), top:px(400), width:px(760), fontSize:px(20), color:'var(--gold)', opacity:1 });
    S(E.fixsub,{ html:M1.fixsub, opacity:1, left:px(90), top:px(442), width:px(820), fontSize:px(24) });
  });

  // State — THE TAKEAWAY. Zoom out: tracking units matters because running out is a major silent loss.
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Takeaway · 01'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'1', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    // the takeaway, big serif, owning the frame
    S(E.fixline,{ html:M1.takeaway, opacity:1, left:px(90), top:px(250), width:px(880), fontSize:px(52) });
    // supporting weight, tucked right beneath
    S(E.fixsub,{ html:M1.takeawaySub, opacity:1, left:px(90), top:px(430), width:px(820), fontSize:px(23) });
  });

  // ---- money flow builder: paid out vs reimbursed (denied) ----
  function buildMoneyflow(){
    if(E.moneyflow.dataset.built) return;
    E.moneyflow.innerHTML=`
      <div class="step out" data-s="0">
        <div class="node">The company pays the RBT</div>
        <div class="flow">→ <span class="amt">$10,400</span> out</div>
        <div class="desc">The sessions happened. Payroll goes out either way &mdash; that's guaranteed.</div>
      </div>
      <div class="step back" data-s="1">
        <div class="node">Bills insurance</div>
        <div class="flow">→ <span class="node denied" style="min-width:auto;display:inline-block;padding:6px 16px;font-size:18px">DENIED</span></div>
        <div class="desc">The units weren't authorized, so the claims bounce. <b>$0</b> comes back.</div>
      </div>
      <div class="lost" data-lost>
        <span class="lt">Lost revenue, if the denials aren't caught:</span>
        <span class="lv">$10,400</span>
        <span class="cond">paid out, never collected</span>
      </div>`;
    E.moneyflow.dataset.built='1';
  }
  function setFlowShown(n){
    for(let k=0;k<2;k++){ const s=E.moneyflow.querySelector(`[data-s="${k}"]`); if(s) s.classList.toggle('in', k<n); }
    const lost=E.moneyflow.querySelector('[data-lost]'); if(lost) lost.classList.toggle('in', n>=3);
  }

  // ---- depletion race builder ----
  function buildBurndown(){
    if(E.burndown.dataset.built) return;
    E.burndown.innerHTML=`
      <div class="row">
        <div class="rl"><div class="name">At <b style="color:var(--paper)">2 hrs/day</b> — as authorized</div><div class="out">Pool lasts the full 6 months</div></div>
        <div class="track"><div class="fill slow"></div></div>
      </div>
      <div class="row">
        <div class="rl"><div class="name">At <b>4 hrs/day</b> — doubled</div><div class="out danger">Pool runs dry at month 3</div></div>
        <div class="track"><div class="fill fast"></div><div class="uncovered"><div class="ulab">Uncovered · still in therapy</div></div></div>
        <div class="axis"><span>Month 0</span><span>Month 3</span><span>Month 6</span></div>
      </div>`;
    E.burndown.dataset.built='1';
  }
  function runBurndown(forward){
    const slow=E.burndown.querySelector('.fill.slow');
    const fast=E.burndown.querySelector('.fill.fast');
    const unc=E.burndown.querySelector('.uncovered');
    if(forward){
      slow.style.width='0'; fast.style.width='0'; unc.classList.remove('show');
      // slow track: units last the full period → fills to 100% slowly
      later(()=>{ slow.style.transitionDuration='2.4s'; slow.style.width='100%'; }, 60);
      // fast track: same pool, double rate → covered units exhausted at month 3 (50% of timeline)
      later(()=>{ fast.style.transitionDuration='1.2s'; fast.style.width='50%'; }, 60);
      // then the uncovered danger zone (month 3→6) reveals
      later(()=>{ unc.classList.add('show'); }, 1400);
    } else {
      slow.style.transitionDuration='0s'; fast.style.transitionDuration='0s';
      slow.style.width='100%'; fast.style.width='50%'; unc.classList.add('show');
    }
  }

  // ---- hours increase visual builder ----
  function buildHoursViz(){
    if(E.hoursviz.dataset.built) return;
    E.hoursviz.innerHTML=`
      <div class="col before"><div class="num">2</div><div class="bar"></div><div class="cap">HRS / DAY</div></div>
      <div class="arrow">→</div>
      <div class="col after"><div class="num">4</div><div class="bar"></div><div class="cap">HRS / DAY</div></div>`;
    E.hoursviz.dataset.built='1';
  }

  // ---- four outcomes builder ----
  function buildOutcomes(){
    if(E.outcomes.dataset.built) return;
    E.outcomes.innerHTML=M1.outcomes.map((o,k)=>`
      <div class="oc ${o.tone}" data-oc="${k}">
        <div class="tag">${o.tag}</div>
        <div class="h">${o.h}</div>
        <div class="d">${o.d}</div>
      </div>`).join('');
    E.outcomes.dataset.built='1';
  }
  // show outcome cards up to n (0..4)
  function setOutcomesShown(n){
    for(let k=0;k<4;k++){ const c=E.outcomes.querySelector(`[data-oc="${k}"]`); if(c) c.classList.toggle('in', k<n); }
  }

  // ---- math breakdown builder ----
  function buildMath(){
    if(E.mathrow.dataset.built) return;
    E.mathrow.innerHTML=`
      <div class="factor" data-f="1"><div class="val">10 hrs</div><div class="why">2 extra hrs/day &times; 5 days a week</div></div>
      <div class="op" data-o="1">&times;</div>
      <div class="factor" data-f="2"><div class="val">$80</div><div class="why">RBT direct therapy, per hour</div></div>
      <div class="op" data-o="2">&times;</div>
      <div class="factor" data-f="3"><div class="val">13 wks</div><div class="why">left in the 6-month auth</div></div>
      <div class="op" data-o="3">=</div>
      <div class="factor" data-f="4"><div class="val eqval">$10,400</div><div class="why">never authorized — may go uncollected</div></div>`;
    E.mathrow.dataset.built='1';
  }
  // show factors/ops up to n (1..4). n=0 hides all.
  function setMathShown(n){
    for(let k=1;k<=4;k++){ const f=E.mathrow.querySelector(`[data-f="${k}"]`); if(f) f.classList.toggle('in', k<=n); }
    for(let k=1;k<=3;k++){ const o=E.mathrow.querySelector(`[data-o="${k}"]`); if(o) o.classList.toggle('in', k<n); }
  }

  // ---- money count-up (lands on peak and HOLDS) ----
  const easeOut=p=>1-Math.pow(1-p,3);
  let moneyRAF=null;
  function countUp(node,peak){ cancelAnimationFrame(moneyRAF); let t0=null; const dur=1400;
    (function s(ts){ if(!t0)t0=ts; let p=Math.min(1,(ts-t0)/dur);
      node.textContent='$'+Math.round(peak*easeOut(p)).toLocaleString();
      if(p<1) moneyRAF=requestAnimationFrame(s);
    })(performance.now()); }

  // ---- controller: cancel pending timers on every change; pass direction so
  //      animations only play going FORWARD. Backward/jumps snap to resting state. ----
  let pendingTimers=[];
  function clearTimers(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[];
    cancelAnimationFrame(moneyRAF); }
  function later(fn,ms){ const t=setTimeout(fn,ms); pendingTimers.push(t); return t; }

  let i=-1;
  function go(n, forward){ if(n<0||n>=states.length) return;
    clearTimers(); i=n; states[i](forward);
    parent.postMessage({deck:1, type:'pos', idx:i, total:states.length}, '*');
  }
  function next(){ if(i<states.length-1){ go(i+1, true); } else { parent.postMessage({deck:1, type:'chapterEnd'}, '*'); } }
  function back(){ if(i>0){ go(i-1, false); } else { parent.postMessage({deck:1, type:'chapterStart'}, '*'); } }
  go(0);
  document.getElementById('click').addEventListener('click', next);
  stage.tabIndex=0;
  // parent drives navigation; listen for commands
  window.addEventListener('message', e=>{
    const m=e.data||{}; if(!m.deckcmd) return;
    if(m.deckcmd==='next') next();
    else if(m.deckcmd==='back') back();
    else if(m.deckcmd==='first') go(0, true);
    else if(m.deckcmd==='last') go(states.length-1, true);
  });
  // also allow local keys to bubble to parent for resilience
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); back(); }
    else if(e.key.toLowerCase()==='f'){ parent.postMessage({deck:1,type:'fs'},'*'); }
  });
})();

<\/script>

<script type="text/html" id="chap1"><meta charset="utf-8">
<!-- ABA — ONE continuous canvas. Persistent elements morph between states on each click. -->
<div id="frame"><div id="stage"></div></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --ink:#1E2730; --ink2:#161D25; --ink3:#0C1117;
    --paper:#F5F7FA; --gold:#2F7D5B; --teal:#3E6E8E; --papmut:#8A97A6; --rust:#B5524A;
    --head:'Roboto Slab', Georgia, serif; --body:'Inter', system-ui, sans-serif;
    --ease:cubic-bezier(.45,.05,.2,1);
    --dur:.85s;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#000; overflow:hidden; }
  #frame{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
  #stage{ position:relative; width:1280px; height:720px; overflow:hidden; flex:none; font-family:var(--body);
    transform-origin:center center;
    background:
      radial-gradient(130% 100% at 80% 22%, rgba(47,125,91,.12), transparent 52%),
      radial-gradient(110% 130% at 5% 105%, rgba(74,120,196,.20), transparent 60%),
      linear-gradient(150deg, var(--ink) 0%, var(--ink2) 55%, var(--ink3) 100%);
  }
  #stage::after{ content:''; position:absolute; inset:0; pointer-events:none;
    box-shadow:inset 0 0 170px 50px rgba(0,0,0,.5); z-index:0; }

  /* every persistent element is absolutely placed and transitions ALL geometry */
  .el{ position:absolute; transition:
      left var(--dur) var(--ease), top var(--dur) var(--ease),
      width var(--dur) var(--ease), height var(--dur) var(--ease),
      font-size var(--dur) var(--ease), opacity .6s ease, color .5s ease,
      transform var(--dur) var(--ease), letter-spacing var(--dur) var(--ease);
    will-change:left,top,font-size,opacity; }

  /* the eyebrow / kicker */
  #eyebrow{ font-weight:700; letter-spacing:.4em; text-transform:uppercase; white-space:nowrap;
    display:flex; align-items:center; z-index:5; }
  #eyebrow .line{ display:inline-block; width:42px; height:2px; margin-right:16px; flex:none;
    transition:background .5s, box-shadow .5s, width var(--dur) var(--ease); }

  /* the BIG number — travels from center-stage hero to ghost-right */
  #bignum{ font-family:var(--head); font-weight:900; line-height:.74; font-variant-numeric:tabular-nums;
    z-index:1; text-align:right; pointer-events:none; }

  /* the TITLE — morphs from map label to mistake headline */
  #title{ font-family:var(--head); font-weight:800; line-height:1.05; letter-spacing:-.015em;
    color:var(--paper); z-index:4; }

  /* the small label above title (MISTAKE 0X) */
  #label{ font-family:var(--head); font-weight:800; letter-spacing:.06em; z-index:4; }

  /* money figure (lives off-stage until mistake) */
  #money{ font-family:var(--head); font-weight:900; line-height:.9; color:var(--gold);
    text-shadow:0 0 60px rgba(47,125,91,.5); font-variant-numeric:tabular-nums; letter-spacing:-.02em;
    text-align:right; z-index:3; }
  #moneycap{ font-family:var(--body); font-weight:500; color:var(--papmut); text-align:right;
    line-height:1.4; z-index:3; }

  /* story + info (enter on later mistake states) */
  #story{ z-index:4; width:780px; }
  #story .w{ font-weight:700; font-size:18px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin-bottom:18px; }
  #story .t{ font-family:var(--head); font-weight:700; color:var(--paper); opacity:.95; font-size:27px; line-height:1.4; }
  #story .t b{ font-weight:900; color:#fff; }
  #story .t .hl{ font-weight:900; color:var(--gold); }
  #info{ z-index:4; display:flex; gap:18px; align-items:flex-start; width:980px; }
  #info .dot{ flex:none; width:40px; height:40px; border-radius:50%; background:rgba(47,125,91,.14);
    border:1px solid rgba(47,125,91,.4); display:flex; align-items:center; justify-content:center;
    color:var(--gold); font-family:var(--head); font-weight:800; font-style:italic; font-size:22px; }
  #info .it{ font-style:italic; color:var(--papmut); line-height:1.5; padding-top:6px; font-size:20px; }

  /* fix line (the resolution) + supporting detail */
  #fixline{ font-family:var(--head); font-weight:800; line-height:1.15; letter-spacing:-.01em;
    color:var(--paper); z-index:4; width:740px; }
  #fixsub{ z-index:4; width:680px; color:#B9C9C7; line-height:1.5; }
  #fixsub b{ color:var(--paper); font-weight:700; }

  /* the math breakdown: factors with a "why" label under each */
  #mathrow{ z-index:4; display:flex; align-items:flex-start; gap:22px; }
  #mathrow .factor{ display:flex; flex-direction:column; align-items:center; text-align:center;
    opacity:0; transform:translateY(10px); transition:opacity .45s var(--ease), transform .45s var(--ease); }
  #mathrow .factor.in{ opacity:1; transform:none; }
  #mathrow .val{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--paper); line-height:1; }
  #mathrow .why{ font-family:var(--body); font-weight:500; font-size:14px; color:var(--papmut);
    margin-top:10px; max-width:150px; line-height:1.35; }
  #mathrow .op{ font-family:var(--head); font-weight:700; font-size:34px; color:var(--gold); padding-top:2px;
    opacity:0; transition:opacity .4s; }
  #mathrow .op.in{ opacity:.85; }
  #mathrow .eqval{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--gold);
    line-height:1; text-shadow:0 0 20px rgba(47,125,91,.4); }

  /* four outcomes: 2x2, good ones calm, bad ones heavier with glow */
  #outcomes{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  #outcomes .oc{ border-radius:14px; padding:18px 24px; position:relative;
    opacity:0; transform:translateY(16px); transition:opacity .5s var(--ease), transform .5s var(--ease);
    background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); }
  #outcomes .oc.in{ opacity:1; transform:none; }
  #outcomes .oc.bad{ background:rgba(181,82,74,.10); border-color:rgba(181,82,74,.45);
    box-shadow:0 0 30px rgba(181,82,74,.12); }

  /* depletion race: same unit pool, two bars draining at different rates */
  #burndown{ z-index:4; width:1000px; }

  #burndown .rl{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  #burndown .rl .name{ font-family:var(--head); font-weight:700; font-size:22px; color:var(--paper); }
  #burndown .rl .name b{ color:var(--gold); }
  #burndown .rl .out{ font-family:var(--body); font-weight:600; font-size:15px; color:var(--papmut); }
  #burndown .rl .out.danger{ color:var(--rust); font-weight:700; }
  /* the track = full 6-month pool */
  #burndown .track{ position:relative; height:30px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; }
  /* the fill = units consumed, drains across */
  #burndown .fill{ position:absolute; left:0; top:0; bottom:0; border-radius:8px 0 0 8px;
    transition:width 1.1s var(--ease); }
  #burndown .fill.slow{ background:linear-gradient(90deg,var(--teal),#1f5f5b); width:0; }
  #burndown .fill.fast{ background:linear-gradient(90deg,var(--gold),#1F5B40); width:0;
    box-shadow:0 0 24px rgba(47,125,91,.3); }
  /* the uncovered zone on the fast track (month 3→6) */
  #burndown .uncovered{ position:absolute; top:0; bottom:0; right:0; width:50%;
    background:repeating-linear-gradient(45deg, rgba(181,82,74,.16) 0 8px, transparent 8px 16px);
    border-left:2px dashed rgba(181,82,74,.6); opacity:0; transition:opacity .5s ease .6s; }
  #burndown .uncovered.show{ opacity:1; }
  #burndown .uncovered .ulab{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);

    color:var(--rust); white-space:nowrap; }
  /* month axis */
  #burndown .axis{ display:flex; justify-content:space-between; margin-top:8px;
    font-family:var(--body); font-size:13px; color:var(--papmut); opacity:.6; }

  /* money flow: pays RBT (out) vs reimbursement (denied) → lost revenue if not caught */
  #moneyflow{ z-index:4; width:1080px; }

  #moneyflow .step.in{ opacity:1; transform:none; }
  #moneyflow .node{ flex:none; min-width:200px; padding:18px 22px; border-radius:12px; text-align:center;

  #moneyflow .flow{ font-family:var(--head); font-weight:800; font-size:26px; white-space:nowrap; }

  #moneyflow .desc{ font-family:var(--body); font-weight:500; font-size:17px; line-height:1.4; color:var(--papmut); }
  /* out = money leaving, certain (teal) */
  #moneyflow .out .flow{ color:var(--teal); }
  #moneyflow .out .amt{ color:var(--paper); }
  /* back = reimbursement blocked (rust) */
  #moneyflow .back .flow{ color:var(--rust); }
  #moneyflow .back .amt{ color:var(--rust); }
  #moneyflow .back .node.denied{ border-color:rgba(181,82,74,.5); background:rgba(181,82,74,.1);

  /* the lost total */

  #moneyflow .lost.in{ opacity:1; transform:none; }
  #moneyflow .lost .lt{ font-family:var(--body); font-weight:600; font-size:19px; color:var(--papmut); }
  #moneyflow .lost .lv{ font-family:var(--head); font-weight:900; font-size:48px; color:var(--gold);
    text-shadow:0 0 30px rgba(47,125,91,.4); }
  #moneyflow .lost .cond{ font-family:var(--body); font-weight:600; font-size:16px; font-style:italic;
    color:var(--rust); }

  /* highlight for stat lines */
  .hl2{ color:var(--gold); font-weight:700; }
  #moneycap b{ color:var(--paper); font-weight:700; }

  /* denial pile: claims stacking up unworked */
  #pile{ z-index:4; }
  #pile .pilelabel{ font-family:var(--body); font-weight:700; font-size:14px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--rust); margin-bottom:16px; }
  #pile .claim{ display:flex; align-items:center; gap:12px; padding:14px 18px; margin-bottom:10px;
    border-radius:10px; background:rgba(181,82,74,.10); border:1px solid rgba(181,82,74,.4);
    font-family:var(--head); font-weight:700; font-size:18px; color:var(--paper);
    opacity:0; transform:translateY(-14px); transition:opacity .4s var(--ease), transform .4s var(--ease); }
  #pile .claim.in{ opacity:1; transform:none; }
  #pile .claim .cx{ color:var(--rust); font-weight:900; font-size:22px; }

  /* deadline window: refile clock running out */
  #deadline{ z-index:4; width:1010px; }
  #deadline .dlrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #deadline .dlname{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper); }
  #deadline .dlout{ font-family:var(--body); font-weight:600; font-size:17px; color:var(--rust); }
  #deadline .dltrack{ position:relative; height:34px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; margin-bottom:40px; }
  #deadline .dlfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:8px 0 0 8px;
    background:linear-gradient(90deg, rgba(74,120,196,.5), var(--rust)); }
  #deadline .dlflag{ position:absolute; top:42px; font-family:var(--body); font-weight:600; font-size:14px;
    color:var(--papmut); }
  #deadline .dlflag-start{ left:0; }
  #deadline .dlflag-end{ right:0; color:var(--rust); }
  #deadline .dlnote{ font-family:var(--body); font-size:21px; line-height:1.5; color:var(--papmut);
    opacity:0; transform:translateY(12px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #deadline .dlnote.in{ opacity:1; transform:none; }
  #deadline .dlnote .ok{ color:var(--teal); font-weight:700; }
  #deadline .dlnote .bad{ color:var(--rust); font-weight:700; }

  /* progress ticks (persist across the whole map→mistakes journey) */
  #ticks{ position:absolute; left:90px; bottom:74px; display:flex; gap:16px; align-items:center; z-index:5; }
  .tick{ width:60px; height:5px; border-radius:3px; background:rgba(255,255,255,.13);
    transition:background .5s, box-shadow .5s, transform .4s; }
  .tick.done{ background:rgba(47,125,91,.38); }
  .tick.active{ background:var(--gold); box-shadow:0 0 16px rgba(47,125,91,.7); transform:scaleY(1.8); }

  #counter{ position:absolute; right:90px; bottom:70px; font-family:var(--head); font-weight:700;
    font-size:19px; color:var(--papmut); z-index:5; letter-spacing:.06em; opacity:.75; }
  #hint{ position:absolute; bottom:30px; left:90px; font-size:13px; color:var(--papmut); opacity:.4; z-index:5; }
  #click{ position:absolute; inset:0; z-index:6; cursor:pointer; }
  .hidden{ opacity:0 !important; }
</style>

<script>
(function(){
  const stage=document.getElementById('stage'), frame=document.getElementById('frame');
  function fit(){ const s=Math.min(window.innerWidth/1280, window.innerHeight/720); stage.style.transform='scale('+s+')'; }
  window.addEventListener('resize',fit); fit();

  const items=[
    "Not staying on top of authorized units","Not reworking denied claims","Ignoring aging claims",
    "Not tying sessions to claims","Not keeping a record on every claim","Not fixing denials at the source",
    "Notes that don't match the claims"
  ];
  const M2={
    story:"Letting denied claims just sit there. <b>Simple version</b> — if you don't call on a denied claim, <span class='hl'>it never gets paid.</span> That money's gone.",
    truth:"If you don't call on a denied claim, <span class='hl'>it never gets paid.</span> That money's gone.",
    truthHead:"The simple version",
    fix:"The fix is simple — pull your denial list every week.",
    fixsub:"<b>Find out why each one bounced</b>, fix it, and resend it before the clock runs out.",
    takeaway:"Most of that 15% is winnable — it's sitting right there.",
    takeawaySub:"You just have to work it. <b>Pull the list, fix what bounced, resend before the deadline.</b>" };
  const pad=n=>String(n).padStart(2,'0');

  // build persistent elements ONCE
  stage.insertAdjacentHTML('beforeend',`
    <div class="el" id="eyebrow"><span class="line"></span><span class="ebtext"></span></div>
    <div class="el" id="bignum">1</div>
    <div class="el" id="label"></div>
    <div class="el" id="title"></div>
    <div class="el" id="money"></div>
    <div class="el" id="moneycap"></div>
    <div class="el" id="story"><div class="w">What happens</div><div class="t"></div></div>
    <div class="el" id="info"><div class="dot">i</div><div class="it"></div></div>
    <div class="el" id="fixline"></div>
    <div class="el" id="fixsub"></div>
    <div class="el" id="mathrow"></div>
    <div class="el" id="outcomes"></div>
    <div class="el" id="hoursviz"></div>
    <div class="el" id="burndown"></div>
    <div class="el" id="moneyflow"></div>
    <div class="el" id="pile"></div>
    <div class="el" id="deadline"></div>
    <div id="ticks">${items.map((_,i)=>`<div class="tick" data-i="${i}"></div>`).join('')}</div>
    <div id="counter">01 / 07</div>
    <div id="hint">&rarr; advance &middot; &larr; back &middot; F fullscreen</div>
    <div id="click"></div>`);

  const E={ eyebrow:el('eyebrow'), ebtext:stage.querySelector('.ebtext'), ebline:stage.querySelector('#eyebrow .line'),
    bignum:el('bignum'), label:el('label'), title:el('title'), money:el('money'), moneycap:el('moneycap'),
    story:el('story'), storyt:stage.querySelector('#story .t'), info:el('info'), infot:stage.querySelector('#info .it'),
    fixline:el('fixline'), fixsub:el('fixsub'), mathrow:el('mathrow'), outcomes:el('outcomes'), hoursviz:el('hoursviz'), burndown:el('burndown'), moneyflow:el('moneyflow'), pile:el('pile'), deadline:el('deadline'),
    ticks:[...stage.querySelectorAll('.tick')], counter:el('counter') };
  function el(id){ return document.getElementById(id); }

  // set helper: apply geometry/style to an element
  function S(node, p){ for(const k in p){ if(k==='text'){ node.textContent=p.text; }
    else if(k==='html'){ node.innerHTML=p.html; } else node.style[k]=p[k]; } }
  function px(n){ return n+'px'; }

  // ----- STATE DEFINITIONS -----
  // Each state is a function that POSITIONS every persistent element for that moment.
  // Elements transition from their previous state to this one = continuous morph.

  function setTicks(activeIdx){ E.ticks.forEach((t,j)=>{ t.classList.remove('active','done');
    if(activeIdx>=0){ if(j<activeIdx)t.classList.add('done'); if(j===activeIdx)t.classList.add('active'); } }); }

  // PROTOTYPE PATH: state0 = map showing mistake 1, then dive into mistake 1's beats.
  const states=[];
  states.push(mapState(1)); // map, focused on mistake 2

  // Hide every CONTENT element. Each state calls this first, then shows only what it needs.
  // Elements keep their last position while hidden, so showing them again still morphs.
  function resetAll(){
    [E.bignum,E.label,E.title,E.money,E.moneycap,E.story,E.info,E.fixline,E.fixsub,E.mathrow,E.outcomes,E.hoursviz,E.burndown,E.moneyflow,E.pile,E.deadline]
      .forEach(n=>{ n.style.opacity='0'; });
  }
  // assert the rust "THE MISTAKE" eyebrow (used by all mistake-phase states)
  function mistakeEyebrow(){
    S(E.ebtext,{text:'The Mistake · 02'}); E.ebtext.style.color='var(--rust)';
    E.ebline.style.background='var(--rust)'; E.ebline.style.boxShadow='0 0 12px var(--rust)';
    S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)}); E.eyebrow.style.opacity=.95;
  }

  // map state for mistake i (0-based)
  function mapState(i){
    return ()=>{
      resetAll();
      E.eyebrow.style.opacity=1;
      S(E.ebtext,{text:'The Map · Seven mistakes, one rhythm'});
      E.ebtext.style.color='var(--gold)'; E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
      S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)});

      // big number = ghost on the right, dim
      S(E.bignum,{ text:String(i+1), left:px(760), top:px(150), width:px(490), height:px(440),
        fontSize:px(440), color:'var(--gold)', opacity:.12, transform:'none' });
      E.bignum.style.textAlign='right';

      // label (MISTAKE 0X) sits above the morphing title, gold
      S(E.label,{ text:'MISTAKE '+pad(i+1), left:px(90), top:px(296), width:px(600), fontSize:px(23),
        color:'var(--gold)', opacity:1 });

      // TITLE = the mistake text, centered-left, big
      S(E.title,{ text:items[i], left:px(90), top:px(330), width:px(720), fontSize:px(62), opacity:1, color:'var(--paper)' });

      // money + story + info parked off-state (invisible, positioned where they'll enter from)
      S(E.money,{ opacity:0, left:px(820), top:px(250), width:px(380), fontSize:px(130) });
      S(E.moneycap,{ opacity:0, left:px(820), top:px(400), width:px(380), fontSize:px(20) });
      S(E.story,{ opacity:0, left:px(90), top:px(470), fontSize:px(23) });
      S(E.info,{ opacity:0, left:px(90), top:px(560) });
      S(E.fixline,{ opacity:0, left:px(90), top:px(330), fontSize:px(52) });
      S(E.fixsub,{ opacity:0, left:px(90), top:px(560), fontSize:px(21) });
      S(E.mathrow,{ opacity:0 });

      setTicks(i); E.counter.textContent=pad(i+1)+' / 07'; E.counter.style.opacity=.75;
      E.ticks.forEach(t=>t.style.opacity=1); E.counter.style.opacity=.75;
    };
  }
  // ---- DIVE into mistake 2: denied claims left to die in a pile ----

  // State A — THE OPENING. Your words: letting denied claims sit there; if you don't call, it never gets paid.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'2', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:0 });
    S(E.label,{ html:'Simple version', left:px(90), top:px(180), width:px(720), fontSize:px(22), color:'var(--gold)', opacity:1 });
    S(E.storyt,{ html:"If you don't call on a denied claim, <span class='hl'>it never gets paid.</span> That money's gone." });
    const w=stage.querySelector('#story .w'); if(w) w.style.opacity='0';
    S(E.story,{ opacity:1, left:px(90), top:px(250), width:px(720), fontSize:px(38) });
    E.storyt.style.fontSize='42px'; E.storyt.style.lineHeight='1.3';
    buildPile();
    S(E.pile,{ opacity:1, left:px(850), top:px(230), width:px(360) });
    runPile(forward);
    setTicks(1); E.counter.textContent='02 / 07';
  });

  // State B — THE SCALE. Your words: ~15%, conservative, depends on payer/state; 100 claims → 15.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'2', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'This adds up faster than people think', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    S(E.money,{ html:'~15%', left:px(90), top:px(245), width:px(700), fontSize:px(130), opacity:1 });
    E.money.style.textAlign='left';
    S(E.moneycap,{ html:'of claims come back <b>denied or underpaid</b> &mdash; and that\u2019s conservative; it depends on your payer and your state. Out of 100 claims a month, that\u2019s <span class="hl2">15 that don\u2019t pay right the first time.</span>', left:px(90), top:px(445), width:px(760), fontSize:px(24), opacity:1 });
    E.moneycap.style.textAlign='left';
  });

  // State D — THE DEADLINE. If they sit in a pile and the refile window passes, they're gone.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'2', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'And there\u2019s a clock on them', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    buildDeadline();
    S(E.deadline,{ opacity:1, left:px(90), top:px(260), width:px(1010) });
    runDeadline(forward);
  });

  // State D — THE GOOD NEWS. Your words: when you call on them, most get paid; winnable, sitting right there.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'2', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'Now here\u2019s the good news', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    S(E.money,{ html:'80%+', left:px(90), top:px(245), width:px(700), fontSize:px(130), opacity:1 });
    E.money.style.textAlign='left';
    S(E.moneycap,{ html:'When you actually call on them, <span class="hl2">most get paid</span> &mdash; studies find over 80% of appealed denials get overturned. <b>Most of that 15% is winnable. It\u2019s sitting right there.</b>', left:px(90), top:px(445), width:px(770), fontSize:px(24), opacity:1 });
    E.moneycap.style.textAlign='left';
  });

  // ---- THE FIX (the turn: rust→gold). Just the fix line, owning the frame. ----
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 02'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'2', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    S(E.fixline,{ html:M2.fix, opacity:1, left:px(90), top:px(260), width:px(840), fontSize:px(52) });
    S(E.fixsub,{ opacity:0, top:px(560) });
  });

  // Fix detail
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 02'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'2', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    S(E.fixline,{ html:M2.fix, opacity:1, left:px(90), top:px(200), width:px(840), fontSize:px(46) });
    S(E.label,{ html:'How to actually do it', left:px(90), top:px(420), width:px(760), fontSize:px(20), color:'var(--gold)', opacity:1 });
    S(E.fixsub,{ html:M2.fixsub, opacity:1, left:px(90), top:px(462), width:px(840), fontSize:px(24) });
  });

  // Takeaway
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Takeaway · 02'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'2', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    S(E.fixline,{ html:M2.takeaway, opacity:1, left:px(90), top:px(240), width:px(900), fontSize:px(50) });
    S(E.fixsub,{ html:M2.takeawaySub, opacity:1, left:px(90), top:px(450), width:px(840), fontSize:px(23) });
  });

  // ---- denial pile builder: claims stacking up unworked ----
  function buildPile(){
    if(E.pile.dataset.built) return;
    E.pile.innerHTML=`
      <div class="pilelabel">Denied claims, unworked</div>
      <div class="pilestack">
        ${[0,1,2,3,4].map(k=>`<div class="claim" data-c="${k}"><span class="cx">&times;</span> Claim denied</div>`).join('')}
      </div>`;
    E.pile.dataset.built='1';
  }
  function runPile(forward){
    const cards=[...E.pile.querySelectorAll('.claim')];
    if(forward){
      cards.forEach(c=>c.classList.remove('in'));
      cards.forEach((c,k)=> later(()=>c.classList.add('in'), 200+k*180));
    } else {
      cards.forEach(c=>c.classList.add('in'));
    }
  }

  // ---- deadline window builder: refile clock running out ----
  function buildDeadline(){
    if(E.deadline.dataset.built) return;
    E.deadline.innerHTML=`
      <div class="dlrow">
        <div class="dlname">The refile window</div>
        <div class="dlout">60&ndash;90 days, then it's permanent</div>
      </div>
      <div class="dltrack">
        <div class="dlfill"></div>
        <div class="dlflag dlflag-start">Denied</div>
        <div class="dlflag dlflag-end">Deadline</div>
      </div>
      <div class="dlnote">Let them sit past the refile deadline and they're <span class="bad">lost for good</span> &mdash; not because the claim was bad, just because <span class="bad">nobody worked it in time</span>.</div>`;
    E.deadline.dataset.built='1';
  }
  function runDeadline(forward){
    const fill=E.deadline.querySelector('.dlfill');
    const note=E.deadline.querySelector('.dlnote');
    if(forward){
      fill.style.transitionDuration='0s'; fill.style.width='0'; note.classList.remove('in');
      later(()=>{ fill.style.transitionDuration='2.4s'; fill.style.width='100%'; }, 80);
      later(()=>note.classList.add('in'), 1500);
    } else {
      fill.style.transitionDuration='0s'; fill.style.width='100%'; note.classList.add('in');
    }
  }

  // ---- money count-up (kept from engine, unused in #2 but harmless) ----
  const easeOut=p=>1-Math.pow(1-p,3);
  let moneyRAF=null;
  function countUp(node,peak){ cancelAnimationFrame(moneyRAF); let t0=null; const dur=1400;
    (function s(ts){ if(!t0)t0=ts; let p=Math.min(1,(ts-t0)/dur);
      node.textContent='$'+Math.round(peak*easeOut(p)).toLocaleString();
      if(p<1) moneyRAF=requestAnimationFrame(s);
    })(performance.now()); }


  // ---- controller: cancel pending timers on every change; pass direction so
  //      animations only play going FORWARD. Backward/jumps snap to resting state. ----
  let pendingTimers=[];
  function clearTimers(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[];
    cancelAnimationFrame(moneyRAF); }
  function later(fn,ms){ const t=setTimeout(fn,ms); pendingTimers.push(t); return t; }

  let i=-1;
  function go(n, forward){ if(n<0||n>=states.length) return;
    clearTimers(); i=n; states[i](forward);
    parent.postMessage({deck:1, type:'pos', idx:i, total:states.length}, '*');
  }
  function next(){ if(i<states.length-1){ go(i+1, true); } else { parent.postMessage({deck:1, type:'chapterEnd'}, '*'); } }
  function back(){ if(i>0){ go(i-1, false); } else { parent.postMessage({deck:1, type:'chapterStart'}, '*'); } }
  go(0);
  document.getElementById('click').addEventListener('click', next);
  stage.tabIndex=0;
  // parent drives navigation; listen for commands
  window.addEventListener('message', e=>{
    const m=e.data||{}; if(!m.deckcmd) return;
    if(m.deckcmd==='next') next();
    else if(m.deckcmd==='back') back();
    else if(m.deckcmd==='first') go(0, true);
    else if(m.deckcmd==='last') go(states.length-1, true);
  });
  // also allow local keys to bubble to parent for resilience
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); back(); }
    else if(e.key.toLowerCase()==='f'){ parent.postMessage({deck:1,type:'fs'},'*'); }
  });
})();

<script type="text/html" id="chap2"><meta charset="utf-8">
<!-- ABA — ONE continuous canvas. Persistent elements morph between states on each click. -->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  /* every persistent element is absolutely placed and transitions ALL geometry */
  .el{ position:absolute; transition:
      left var(--dur) var(--ease), top var(--dur) var(--ease),
      width var(--dur) var(--ease), height var(--dur) var(--ease),
      font-size var(--dur) var(--ease), opacity .6s ease, color .5s ease,

  /* the eyebrow / kicker */
  #eyebrow{ font-weight:700; letter-spacing:.4em; text-transform:uppercase; white-space:nowrap;
    display:flex; align-items:center; z-index:5; }

  /* the BIG number — travels from center-stage hero to ghost-right */

  #title{ font-family:var(--head); font-weight:800; line-height:1.05; letter-spacing:-.015em;

  /* the small label above title (MISTAKE 0X) */

  #info{ z-index:4; display:flex; gap:18px; align-items:flex-start; width:980px; }

  /* fix line (the resolution) + supporting detail */
  #fixline{ font-family:var(--head); font-weight:800; line-height:1.15; letter-spacing:-.01em;

  /* the math breakdown: factors with a "why" label under each */

  #mathrow .eqval{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--gold);
    line-height:1; text-shadow:0 0 20px rgba(47,125,91,.4); }

  /* four outcomes: 2x2, good ones calm, bad ones heavier with glow */
  #outcomes{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  #outcomes .oc{ border-radius:14px; padding:18px 24px; position:relative;

    background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); }
  #outcomes .oc.in{ opacity:1; transform:none; }
  #outcomes .oc.bad{ background:rgba(181,82,74,.10); border-color:rgba(181,82,74,.45);

  #outcomes .oc .tag{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.14em;

  #outcomes .oc .d{ font-size:15px; line-height:1.4; color:var(--papmut); }
  #outcomes .oc .amt{ color:var(--rust); font-weight:700; }

  /* hours increase visual: two bars, before (2hr) and after (4hr, gold, taller) */
  #hoursviz{ display:flex; align-items:flex-end; gap:34px; z-index:4; }
  #hoursviz .col{ display:flex; flex-direction:column; align-items:center; }
  #hoursviz .bar{ width:90px; border-radius:10px 10px 4px 4px; transition:height .7s var(--ease); }
  #hoursviz .before .bar{ height:110px; background:rgba(255,255,255,.16); }
  #hoursviz .after .bar{ height:220px; background:linear-gradient(180deg,var(--gold),#1F5B40);
    box-shadow:0 0 40px rgba(47,125,91,.35); }
  #hoursviz .num{ font-family:var(--head); font-weight:900; font-size:40px; line-height:1; margin-bottom:14px; }
  #hoursviz .before .num{ color:var(--papmut); }
  #hoursviz .after .num{ color:var(--gold); }
  #hoursviz .cap{ font-family:var(--body); font-weight:600; font-size:14px; color:var(--papmut);
    margin-top:14px; letter-spacing:.04em; }
  #hoursviz .arrow{ align-self:center; font-family:var(--head); font-weight:800; font-size:40px;
    color:var(--rust); padding-bottom:80px; }

  /* depletion race: same unit pool, two bars draining at different rates */
  #burndown{ z-index:4; width:1000px; }
  #burndown .row{ margin-bottom:34px; }
  #burndown .rl{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  #burndown .rl .name{ font-family:var(--head); font-weight:700; font-size:22px; color:var(--paper); }
  #burndown .rl .name b{ color:var(--gold); }
  #burndown .rl .out{ font-family:var(--body); font-weight:600; font-size:15px; color:var(--papmut); }
  #burndown .rl .out.danger{ color:var(--rust); font-weight:700; }
  /* the track = full 6-month pool */
  #burndown .track{ position:relative; height:30px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; }
  /* the fill = units consumed, drains across */
  #burndown .fill{ position:absolute; left:0; top:0; bottom:0; border-radius:8px 0 0 8px;
    transition:width 1.1s var(--ease); }
  #burndown .fill.slow{ background:linear-gradient(90deg,var(--teal),#1f5f5b); width:0; }
  #burndown .fill.fast{ background:linear-gradient(90deg,var(--gold),#1F5B40); width:0;
    box-shadow:0 0 24px rgba(47,125,91,.3); }
  /* the uncovered zone on the fast track (month 3→6) */
  #burndown .uncovered{ position:absolute; top:0; bottom:0; right:0; width:50%;
    background:repeating-linear-gradient(45deg, rgba(181,82,74,.16) 0 8px, transparent 8px 16px);
    border-left:2px dashed rgba(181,82,74,.6); opacity:0; transition:opacity .5s ease .6s; }
  #burndown .uncovered.show{ opacity:1; }
  #burndown .uncovered .ulab{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--rust); white-space:nowrap; }
  /* month axis */
  #burndown .axis{ display:flex; justify-content:space-between; margin-top:8px;
    font-family:var(--body); font-size:13px; color:var(--papmut); opacity:.6; }

  /* money flow: pays RBT (out) vs reimbursement (denied) → lost revenue if not caught */
  #moneyflow{ z-index:4; width:1080px; }
  #moneyflow .step{ display:flex; align-items:center; gap:22px; margin-bottom:26px;
    opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #moneyflow .step.in{ opacity:1; transform:none; }
  #moneyflow .node{ flex:none; min-width:200px; padding:18px 22px; border-radius:12px; text-align:center;
    font-family:var(--head); font-weight:700; font-size:21px; color:var(--paper);
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
  #moneyflow .flow{ font-family:var(--head); font-weight:800; font-size:26px; white-space:nowrap; }
  #moneyflow .amt{ font-family:var(--head); font-weight:900; font-size:30px; font-variant-numeric:tabular-nums; }
  #moneyflow .desc{ font-family:var(--body); font-weight:500; font-size:17px; line-height:1.4; color:var(--papmut); }
  /* out = money leaving, certain (teal) */
  #moneyflow .out .flow{ color:var(--teal); }
  #moneyflow .out .amt{ color:var(--paper); }
  /* back = reimbursement blocked (rust) */
  #moneyflow .back .flow{ color:var(--rust); }
  #moneyflow .back .amt{ color:var(--rust); }
  #moneyflow .back .node.denied{ border-color:rgba(181,82,74,.5); background:rgba(181,82,74,.1);

  /* the lost total */
  #moneyflow .lost{ margin-top:8px; padding-top:22px; border-top:1px solid rgba(255,255,255,.1);

  #moneyflow .lost.in{ opacity:1; transform:none; }
  #moneyflow .lost .lt{ font-family:var(--body); font-weight:600; font-size:19px; color:var(--papmut); }
  #moneyflow .lost .lv{ font-family:var(--head); font-weight:900; font-size:48px; color:var(--gold);
    text-shadow:0 0 30px rgba(47,125,91,.4); }
  #moneyflow .lost .cond{ font-family:var(--body); font-weight:600; font-size:16px; font-style:italic;
    color:var(--rust); }

  /* highlight for stat lines */
  .hl2{ color:var(--gold); font-weight:700; }
  #moneycap b{ color:var(--paper); font-weight:700; }

  /* denial pile: claims stacking up unworked */
  #pile{ z-index:4; }
  #pile .pilelabel{ font-family:var(--body); font-weight:700; font-size:14px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--rust); margin-bottom:16px; }
  #pile .claim{ display:flex; align-items:center; gap:12px; padding:14px 18px; margin-bottom:10px;
    border-radius:10px; background:rgba(181,82,74,.10); border:1px solid rgba(181,82,74,.4);

  #pile .claim.in{ opacity:1; transform:none; }
