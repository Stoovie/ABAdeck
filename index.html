        <div class="lrow"><span class="a">Claim #4471</span><span class="b">8 units</span></div>
      </div>`;
    E.linkscene.dataset.built='1';
  }
  function setLinkPhase(phase, forward){
    const ls=E.linkscene;
    const line=ls.querySelector('.line');
    // when not arriving forward, suppress the draw/snap transition so it snaps to rest
    if(forward===false && line){ line.style.transition='none'; void ls.offsetWidth; }
    else if(line){ line.style.transition=''; }
    ls.classList.remove('tied','cut');
    ls.classList.add(phase);
  }


  // ---- crack scene builder + runner ----
  function buildCrack(){
    if(E.crackscene.dataset.built) return;
    const bills=[
      {amt:'$1,240', dx:-150, r0:-8, r1:-22, d:0.0},
      {amt:'$880',  dx:40,   r0:6,  r1:18,  d:0.5},
      {amt:'$2,310', dx:-40,  r0:-3, r1:-10, d:1.0},
      {amt:'$640',  dx:130,  r0:10, r1:26,  d:1.5},
    ].map(b=>`<div class="bill" style="--dx:${b.dx}px;--r0:${b.r0}deg;--r1:${b.r1}deg;--d:${b.d}s">
        <div class="bt">Unpaid claim</div><div class="bv">${b.amt}</div></div>`).join('');
    E.crackscene.innerHTML=`
      <div class="floor"></div>
      <div class="glow"></div>
      <div class="crack"><svg viewBox="0 0 560 34" preserveAspectRatio="none">
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17
                 L510 18 L455 28 L400 16 L340 26 L285 12 L230 27 L175 15 L120 25 L70 19 L0 17 Z"
              fill="#0a0305"/>
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17"
              fill="none" stroke="rgba(47,125,91,.35)" stroke-width="1"/>
      </svg></div>
      ${bills}`;
    E.crackscene.dataset.built='1';
  }
  function runCrack(forward){
    E.crackscene.classList.remove('run','rest');
    // force reflow so re-adding 'run' restarts the animation
    void E.crackscene.offsetWidth;
    if(forward){ E.crackscene.classList.add('run'); }
    else { E.crackscene.classList.add('rest'); }
  }

  // ---- the persistent claim card: built once, morphed per beat ----
  function buildClaim(){
    if(E.claimcard.dataset.built) return;
    E.claimcard.innerHTML=`
      <div class="card" id="claimCardEl">
        <div class="dust"></div>
        <div class="stamp" id="claimStamp">Denied</div>
        <div class="ct">Claim &middot; #4471</div>
        <div class="camt">$1,240</div>
        <div class="crow"><span class="clabel">Status</span><span class="cstatus" id="claimStatus">Submitted</span></div>
      </div>
      <div class="clock" id="claimClock">
        <div class="clockface"><div class="sweep" id="claimSweep"></div><div class="clockhand" id="claimHand"></div></div>
        <div class="clocklabel" id="claimClockLab">Day 1</div>
      </div>`;
    E.claimcard.dataset.built='1';
  }
  // phase: 'fresh' | 'aging' | 'problem' (clock + status + stamp + age handled here)
  function claimPhase(phase, opts){
    opts=opts||{};
    const card=document.getElementById('claimCardEl');
    const status=document.getElementById('claimStatus');
    const hand=document.getElementById('claimHand');
    const sweep=document.getElementById('claimSweep');
    const clockLab=document.getElementById('claimClockLab');
    const stamp=document.getElementById('claimStamp');
    card.classList.remove('aging','problem','lost','revived');
    // each beat = an angle. hand points there; sweep fills the arc up to there.
    const beat={ fresh:20, aging:220, problem:300 };
    const deg=beat[phase];
    // when not arriving forward (back-nav / jump), kill the transition so it snaps
    const fwd = opts.forward!==false;
    hand.style.transition  = fwd ? '' : 'none';
    sweep.style.transition = fwd ? '' : 'none';
    hand.style.transform='translate(-50%,-100%) rotate('+deg+'deg)';
    sweep.style.setProperty('--swept', deg+'deg');
    if(!fwd){ // force the snap to commit, then restore transitions for the next forward move
      void hand.offsetWidth; hand.style.transition=''; sweep.style.transition=''; }
    if(phase==='fresh'){ status.textContent='Submitted'; clockLab.textContent='Day 1'; }
    if(phase==='aging'){ card.classList.add('aging'); status.textContent='Unpaid \u00b7 unnoticed'; clockLab.textContent='Day 45'; }
    if(phase==='problem'){ card.classList.add('problem'); status.textContent='No reply \u00b7 70 days'; stamp.textContent=opts.stamp||'No reply'; clockLab.textContent='Day 70'; }
  }

  function buildAging(){
    if(E.aging.dataset.built) return;
    E.aging.innerHTML=`
      <div class="agrow">
        <div class="agname">Claim #4471 &middot; <b>$1,240</b></div>
        <div class="agout">harder to recover every week</div>
      </div>
      <div class="agtrack">
        <div class="agfill"></div>
        <div class="aglost">Still recoverable</div>
      </div>
      <div class="agaxis"><span>Fresh</span><span>Harder to recover</span><span>Harder still</span></div>
      <div class="agnote">No reply doesn't mean lost. <span class="ok">If they never answered, you can still call on it &mdash; sometimes even past the usual filing window.</span> But every week it sits, <span class="bad">it only gets harder to chase down.</span></div>`;
    E.aging.dataset.built='1';
  }
  function runAging(forward){
    const fill=E.aging.querySelector('.agfill');
    const lost=E.aging.querySelector('.aglost');
    const note=E.aging.querySelector('.agnote');
    if(forward){
      fill.style.transitionDuration='0s'; fill.style.width='0'; lost.classList.remove('show'); note.classList.remove('in');
      later(()=>{ fill.style.transitionDuration='2.6s'; fill.style.width='100%'; }, 80);
      later(()=>lost.classList.add('show'), 2000);
      later(()=>note.classList.add('in'), 1600);
    } else {
      fill.style.transitionDuration='0s'; fill.style.width='100%'; lost.classList.add('show'); note.classList.add('in');
    }
  }

  // ---- money count-up (kept from engine, unused here but harmless) ----
  const easeOut=p=>1-Math.pow(1-p,3);
  let moneyRAF=null;
  function countUp(node,peak){ cancelAnimationFrame(moneyRAF); let t0=null; const dur=1400;
    (function s(ts){ if(!t0)t0=ts; let p=Math.min(1,(ts-t0)/dur);
      node.textContent='$'+Math.round(peak*easeOut(p)).toLocaleString();
      if(p<1) moneyRAF=requestAnimationFrame(s);
    })(performance.now()); }



  // ---- controller: cancel pending timers on every change; pass direction so
  //      animations only play going FORWARD. Backward/jumps snap to resting state. ----
  let pendingTimers=[];
  function clearTimers(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[];
    cancelAnimationFrame(moneyRAF); }
  function later(fn,ms){ const t=setTimeout(fn,ms); pendingTimers.push(t); return t; }

  let i=-1;
  function go(n, forward){ if(n<0||n>=states.length) return;
    clearTimers(); i=n; states[i](forward);
    parent.postMessage({deck:1, type:'pos', idx:i, total:states.length}, '*');
  }
  function next(){ if(i<states.length-1){ go(i+1, true); } else { parent.postMessage({deck:1, type:'chapterEnd'}, '*'); } }
  function back(){ if(i>0){ go(i-1, false); } else { parent.postMessage({deck:1, type:'chapterStart'}, '*'); } }
  go(0);
  document.getElementById('click').addEventListener('click', next);
  stage.tabIndex=0;
  // parent drives navigation; listen for commands
  window.addEventListener('message', e=>{
    const m=e.data||{}; if(!m.deckcmd) return;
    if(m.deckcmd==='next') next();
    else if(m.deckcmd==='back') back();
    else if(m.deckcmd==='first') go(0, true);
    else if(m.deckcmd==='last') go(states.length-1, true);
  });
  // also allow local keys to bubble to parent for resilience
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); back(); }
    else if(e.key.toLowerCase()==='f'){ parent.postMessage({deck:1,type:'fs'},'*'); }
  });
})();

<\/script>
</script>

<script>
const TITLES = ["1 \u00b7 Authorized units", "2 \u00b7 Denied claims", "3 \u00b7 Aging claims", "4 \u00b7 Sessions to claims", "5 \u00b7 Record on every claim", "6 \u00b7 Fix at the source", "The close"];
const deck=document.getElementById('deck'), cbar=document.getElementById('cbar'), ctitle=document.getElementById('ctitle');
let cur=0;
const frames = TITLES.map((t,idx)=>{
  const f=document.createElement('iframe');
  f.className='chap'; f.dataset.i=idx;
  f.srcdoc = document.getElementById('chap'+idx).textContent.replace(/<\\\/script>/g, '<\/script>');
  deck.appendChild(f);
  return f;
});
TITLES.forEach((t,idx)=>{
  const s=document.createElement('div'); s.className='seg'; s.title=t;
  s.onclick=()=>gotoChapter(idx,'first');
  cbar.appendChild(s);
});
const segs=[...cbar.children];
function paintBar(){ segs.forEach((s,idx)=>{ s.classList.toggle('done', idx<cur); s.classList.toggle('active', idx===cur); }); ctitle.textContent=TITLES[cur]; }
function activeFrame(){ return frames[cur]; }
function send(cmd){ const f=activeFrame(); f.contentWindow && f.contentWindow.postMessage({deckcmd:cmd},'*'); }
function gotoChapter(idx, edge){
  if(idx<0||idx>=TITLES.length) return;
  frames[cur].classList.remove('active');
  cur=idx; const f=frames[cur]; f.classList.add('active'); paintBar();
  const cmd = edge==='last' ? 'last' : 'first';
  const fire=()=>{ try{ f.contentWindow.postMessage({deckcmd:cmd},'*'); }catch(e){} };
  fire(); f.onload=fire;
  try{ f.contentWindow.focus(); }catch(e){}
}
window.addEventListener('message', e=>{
  const m=e.data||{}; if(!m.deck) return;
  if(m.type==='chapterEnd'){ if(cur<TITLES.length-1) gotoChapter(cur+1,'first'); }
  else if(m.type==='chapterStart'){ if(cur>0) gotoChapter(cur-1,'last'); }
  else if(m.type==='fs'){ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.(); }
});
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); send('next'); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); send('back'); }
  else if(e.key.toLowerCase()==='f'){ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.(); }
});
frames[0].classList.add('active'); paintBar();
</script>
