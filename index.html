  /* deadline window: refile clock running out */
  #deadline{ z-index:4; width:1010px; }
  #deadline .dlrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #deadline .dlname{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper); }
  #deadline .dlout{ font-family:var(--body); font-weight:600; font-size:17px; color:var(--rust); }
  #deadline .dltrack{ position:relative; height:34px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; margin-bottom:40px; }
  #deadline .dlfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:8px 0 0 8px;
    background:linear-gradient(90deg, rgba(74,120,196,.5), var(--rust)); }
  #deadline .dlflag{ position:absolute; top:42px; font-family:var(--body); font-weight:600; font-size:14px;
    color:var(--papmut); }
  #deadline .dlflag-start{ left:0; }
  #deadline .dlflag-end{ right:0; color:var(--rust); }
  #deadline .dlnote{ font-family:var(--body); font-size:21px; line-height:1.5; color:var(--papmut);
    opacity:0; transform:translateY(12px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #deadline .dlnote.in{ opacity:1; transform:none; }
  #deadline .dlnote .ok{ color:var(--teal); font-weight:700; }
  #deadline .dlnote .bad{ color:var(--rust); font-weight:700; }

  /* aging claim: one claim ages across a timeline, recoverability dropping, crosses the deadline cliff */
  #aging{ z-index:4; width:1010px; }
  #aging .agrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #aging .agname{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper); }
  #aging .agname b{ color:var(--gold); }
  #aging .agout{ font-family:var(--body); font-weight:600; font-size:17px; color:var(--rust); }
  #aging .agtrack{ position:relative; height:40px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); margin-bottom:8px; overflow:visible; }
  /* the fill = the claim aging from fresh (gold) to harder-to-recover (rust), but never "gone" */
  #aging .agfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:8px;
    background:linear-gradient(90deg, var(--gold) 0%, #c98a2e 50%, var(--rust) 100%); max-width:100%; }
  /* the "still recoverable" reassurance tag, riding the end of the fill */
  #aging .aglost{ position:absolute; top:11px; right:16px; font-family:var(--body); font-weight:800;
    font-size:14px; letter-spacing:.08em; text-transform:uppercase; color:#fff;
    opacity:0; transition:opacity .5s ease; z-index:4; text-shadow:0 1px 4px rgba(0,0,0,.55); }
  #aging .aglost.show{ opacity:1; }
  #aging .agaxis{ display:flex; justify-content:space-between; margin-top:44px;
    font-family:var(--body); font-size:14px; color:var(--papmut); opacity:.7; }
  #aging .agnote{ font-family:var(--body); font-size:21px; line-height:1.5; color:var(--papmut);
    margin-top:24px; opacity:0; transform:translateY(12px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #aging .agnote.in{ opacity:1; transform:none; }
  #aging .agnote .bad{ color:var(--rust); font-weight:700; }
  #aging .agnote .ok{ color:var(--teal); font-weight:700; }

  /* ===== the persistent CLAIM CARD that lives through the whole unit ===== */
  #claimcard{ z-index:4; width:520px; }
  #claimcard .card{ position:relative; border-radius:16px; padding:30px 32px;
    background:rgba(244,241,234,.94); box-shadow:0 24px 60px rgba(0,0,0,.45);
    transition:transform .9s var(--ease), filter .9s var(--ease), opacity .6s var(--ease); }
  #claimcard .card .ct{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.16em;
    text-transform:uppercase; color:#9a8f80; margin-bottom:14px; }
  #claimcard .card .camt{ font-family:var(--head); font-weight:900; font-size:46px; color:#1a1410; line-height:1; }
  #claimcard .card .crow{ display:flex; justify-content:space-between; align-items:baseline; margin-top:18px;
    padding-top:16px; border-top:1px solid rgba(0,0,0,.12); }
  #claimcard .card .clabel{ font-family:var(--body); font-weight:600; font-size:15px; color:#6b6155; }
  #claimcard .card .cstatus{ font-family:var(--body); font-weight:800; font-size:15px; letter-spacing:.06em;
    text-transform:uppercase; color:#3a8a4a; transition:color .6s ease; }
  /* age states tint & desaturate the card */
  #claimcard .card.aging{ filter:sepia(.45) brightness(.92); transform:rotate(-1deg); }
  #claimcard .card.problem{ filter:sepia(.6) brightness(.88); transform:rotate(-1.5deg); }
  #claimcard .card.lost{ filter:grayscale(.85) brightness(.6); transform:rotate(-3deg) scale(.96); }
  #claimcard .card.revived{ filter:none; transform:none; box-shadow:0 24px 70px rgba(47,125,91,.3); }
  #claimcard .card.aging .cstatus{ color:#c98a2e; }
  #claimcard .card.problem .cstatus{ color:var(--rust); }
  #claimcard .card.lost .cstatus{ color:#8a8a8a; }
  #claimcard .card.revived .cstatus{ color:#3a8a4a; }
  /* a "dust"/age overlay that grows */
  #claimcard .card .dust{ position:absolute; inset:0; border-radius:16px; pointer-events:none;
    background:repeating-linear-gradient(45deg, rgba(120,90,60,.08) 0 6px, transparent 6px 12px);
    opacity:0; transition:opacity .9s ease; }
  #claimcard .card.aging .dust{ opacity:.5; }
  #claimcard .card.problem .dust{ opacity:.8; }
  #claimcard .card.lost .dust{ opacity:1; }
  /* the hidden problem stamp that surfaces */
  #claimcard .card .stamp{ position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-12deg) scale(1.3); transform-origin:center;
    font-family:var(--head); font-weight:900; font-size:30px; letter-spacing:.04em;
    color:var(--rust); border:4px solid var(--rust); border-radius:10px; padding:8px 20px;
    text-transform:uppercase; opacity:0; transition:opacity .5s ease, transform .5s var(--ease); }
  #claimcard .card.problem .stamp{ opacity:.92; transform:translate(-50%,-50%) rotate(-12deg) scale(1); }
  #claimcard .card.lost .stamp{ opacity:.55; transform:translate(-50%,-50%) rotate(-12deg) scale(1); }

  @property --swept{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
  /* the ticking clock beside the card */
  #claimcard .clock{ position:absolute; }
  #claimcard .clockface{ width:88px; height:88px; border-radius:50%; border:4px solid var(--papmut);
    position:relative; opacity:.85; }
  #claimcard .clockhand{ position:absolute; left:50%; top:50%; width:3px; height:32px; background:var(--rust);
    transform-origin:bottom center; transform:translate(-50%,-100%) rotate(0deg);
    border-radius:3px; transition:transform 1.1s var(--ease); }
  /* a faint trailing arc that fills as the hand sweeps, so elapsed time reads as area */
  #claimcard .clockface .sweep{ position:absolute; inset:-4px; border-radius:50%;
    background:conic-gradient(from 0deg, rgba(181,82,74,.22) 0deg, rgba(181,82,74,.22) var(--swept,0deg), transparent var(--swept,0deg));
    transition:--swept 1.1s var(--ease); }
  #claimcard .clocklabel{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--papmut); margin-top:12px; text-align:center; }

  /* big caption line beneath the claim story */
  #claimcap{ }

  /* ===== final beat: money slipping through the crack ===== */
  #crackscene{ z-index:4; width:1100px; height:520px; pointer-events:none; }
  /* the floor the crack splits */
  #crackscene .floor{ position:absolute; left:0; right:0; bottom:170px; height:2px;
    background:linear-gradient(90deg, transparent, rgba(244,241,234,.18) 20%, rgba(244,241,234,.18) 80%, transparent); }
  /* the crack itself: a dark jagged gap with a faint inner glow */
  #crackscene .crack{ position:absolute; left:50%; bottom:152px; transform:translateX(-50%);
    width:560px; height:44px; }
  #crackscene .crack svg{ width:100%; height:100%; overflow:visible; display:block; }
  /* the glow rising from inside the crack */
  #crackscene .glow{ position:absolute; left:50%; bottom:158px; transform:translateX(-50%);
    width:440px; height:140px; border-radius:50%;
    background:radial-gradient(ellipse at center bottom, rgba(47,125,91,.32), rgba(181,82,74,.14) 45%, transparent 70%);
    filter:blur(7px); opacity:.92; }
  /* each falling bill = a small claim chit */
  #crackscene .bill{ position:absolute; left:50%; top:-40px; width:128px; height:62px; border-radius:8px;
    background:linear-gradient(145deg, #f4f1ea, #e4ddc8); box-shadow:0 10px 24px rgba(0,0,0,.4);
    display:flex; flex-direction:column; justify-content:center; padding:0 14px;
    transform:translate(-50%,0) rotate(0deg); opacity:0; }
  #crackscene .bill .bt{ font-family:var(--body); font-weight:700; font-size:9px; letter-spacing:.14em;
    text-transform:uppercase; color:#9a8f80; }
  #crackscene .bill .bv{ font-family:var(--head); font-weight:900; font-size:24px; color:#1a1410; line-height:1; }
  /* the fall+vanish animation: bill falls to the crack and sinks in, shrinking to nothing */
  @keyframes fallIn{
    0%{   opacity:0; transform:translate(-50%,-40px) rotate(var(--r0,0deg)) scale(1); }
    12%{  opacity:1; }
    58%{  opacity:1; transform:translate(calc(-50% + var(--dx,0px)), 250px) rotate(var(--r1,0deg)) scale(.92); }
    80%{  opacity:1; transform:translate(calc(-50% + var(--dx,0px)*1.05), 300px) rotate(var(--r1,0deg)) scale(.5); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx,0px)*1.05), 322px) rotate(var(--r1,0deg)) scale(.12); }
  }
  #crackscene.run .bill{ animation:fallIn 2.6s var(--ease) forwards; animation-delay:var(--d,0s); }
  /* the crack and glow sit ABOVE the falling bills so money disappears behind the lip */
  #crackscene .crack, #crackscene .glow{ z-index:3; }
  #crackscene .bill{ z-index:2; }
  /* resting (back-nav): bills sit gone, glow steady */
  #crackscene.rest .bill{ opacity:0; }


  #ticks{ position:absolute; left:90px; bottom:74px; display:flex; gap:16px; align-items:center; z-index:5; }
  .tick{ width:60px; height:5px; border-radius:3px; background:rgba(255,255,255,.13);
    transition:background .5s, box-shadow .5s, transform .4s; }
  .tick.done{ background:rgba(47,125,91,.38); }
  .tick.active{ background:var(--gold); box-shadow:0 0 16px rgba(47,125,91,.7); transform:scaleY(1.8); }

  #counter{ position:absolute; right:90px; bottom:70px; font-family:var(--head); font-weight:700;
    font-size:19px; color:var(--papmut); z-index:5; letter-spacing:.06em; opacity:.75; }
  #hint{ position:absolute; bottom:30px; left:90px; font-size:13px; color:var(--papmut); opacity:.4; z-index:5; }
  #click{ position:absolute; inset:0; z-index:6; cursor:pointer; }
  .hidden{ opacity:0 !important; }
</style>

<script>
(function(){
  const stage=document.getElementById('stage'), frame=document.getElementById('frame');
  function fit(){ const s=Math.min(window.innerWidth/1280, window.innerHeight/720); stage.style.transform='scale('+s+')'; }
  window.addEventListener('resize',fit); fit();

  const items=[
    "Not staying on top of authorized units","Not reworking denied claims","Ignoring aging claims",
    "Not tying sessions to claims","Not keeping a record on every claim","Not fixing denials at the source",
    "Notes that don't match the claims"
  ];
  const M3={
    fix:"45+ days, no payment, no denial? Call the payer.",
    fixsub:"Pull the aging report and find them. <b>If it hasn't paid and they haven't denied it</b>, get on the phone, find out what's holding it up, and work it until it pays.",
    takeaway:"A bill you sent never came back on any remittance.",
    takeawaySub:"It wasn't paid and it wasn't denied &mdash; so nothing reminded you it was there, and it got forgotten. <b>It's not lost. It's still yours to collect</b> &mdash; if you go looking for it." };
  const pad=n=>String(n).padStart(2,'0');

  // build persistent elements ONCE
  stage.insertAdjacentHTML('beforeend',`
    <div class="el" id="eyebrow"><span class="line"></span><span class="ebtext"></span></div>
    <div class="el" id="bignum">1</div>
    <div class="el" id="label"></div>
    <div class="el" id="title"></div>
    <div class="el" id="money"></div>
    <div class="el" id="moneycap"></div>
    <div class="el" id="story"><div class="w">What happens</div><div class="t"></div></div>
    <div class="el" id="info"><div class="dot">i</div><div class="it"></div></div>
    <div class="el" id="fixline"></div>
    <div class="el" id="fixsub"></div>
    <div class="el" id="mathrow"></div>
    <div class="el" id="outcomes"></div>
    <div class="el" id="hoursviz"></div>
    <div class="el" id="burndown"></div>
    <div class="el" id="moneyflow"></div>
    <div class="el" id="pile"></div>
    <div class="el" id="deadline"></div>
    <div class="el" id="aging"></div>
    <div class="el" id="claimcard"></div>
    <div class="el" id="crackscene"></div>
    <div id="ticks">${items.map((_,i)=>`<div class="tick" data-i="${i}"></div>`).join('')}</div>
    <div id="counter">01 / 07</div>
    <div id="hint">&rarr; advance &middot; &larr; back &middot; F fullscreen</div>
    <div id="click"></div>`);

  const E={ eyebrow:el('eyebrow'), ebtext:stage.querySelector('.ebtext'), ebline:stage.querySelector('#eyebrow .line'),
    bignum:el('bignum'), label:el('label'), title:el('title'), money:el('money'), moneycap:el('moneycap'),
    story:el('story'), storyt:stage.querySelector('#story .t'), info:el('info'), infot:stage.querySelector('#info .it'),
    fixline:el('fixline'), fixsub:el('fixsub'), mathrow:el('mathrow'), outcomes:el('outcomes'), hoursviz:el('hoursviz'), burndown:el('burndown'), moneyflow:el('moneyflow'), pile:el('pile'), deadline:el('deadline'), aging:el('aging'), claimcard:el('claimcard'), crackscene:el('crackscene'),
    ticks:[...stage.querySelectorAll('.tick')], counter:el('counter') };
  function el(id){ return document.getElementById(id); }

  // set helper: apply geometry/style to an element
  function S(node, p){ for(const k in p){ if(k==='text'){ node.textContent=p.text; }
    else if(k==='html'){ node.innerHTML=p.html; } else node.style[k]=p[k]; } }
  function px(n){ return n+'px'; }

  // ----- STATE DEFINITIONS -----
  // Each state is a function that POSITIONS every persistent element for that moment.
  // Elements transition from their previous state to this one = continuous morph.

  function setTicks(activeIdx){ E.ticks.forEach((t,j)=>{ t.classList.remove('active','done');
    if(activeIdx>=0){ if(j<activeIdx)t.classList.add('done'); if(j===activeIdx)t.classList.add('active'); } }); }

  // PROTOTYPE PATH: state0 = map showing mistake 1, then dive into mistake 1's beats.
  const states=[];
  states.push(mapState(2)); // map, focused on mistake 3

  // Hide every CONTENT element. Each state calls this first, then shows only what it needs.
  // Elements keep their last position while hidden, so showing them again still morphs.
  function resetAll(){
    [E.bignum,E.label,E.title,E.money,E.moneycap,E.story,E.info,E.fixline,E.fixsub,E.mathrow,E.outcomes,E.hoursviz,E.burndown,E.moneyflow,E.pile,E.deadline,E.aging,E.claimcard,E.crackscene]
      .forEach(n=>{ n.style.opacity='0'; });
  }
  // assert the rust "THE MISTAKE" eyebrow (used by all mistake-phase states)
  function mistakeEyebrow(){
    S(E.ebtext,{text:'The Mistake · 03'}); E.ebtext.style.color='var(--rust)';
    E.ebline.style.background='var(--rust)'; E.ebline.style.boxShadow='0 0 12px var(--rust)';
    S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)}); E.eyebrow.style.opacity=.95;
  }

  // map state for mistake i (0-based)
  function mapState(i){
    return ()=>{
      resetAll();
      E.eyebrow.style.opacity=1;
      S(E.ebtext,{text:'The Map · Seven mistakes, one rhythm'});
      E.ebtext.style.color='var(--gold)'; E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
      S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)});

      // big number = ghost on the right, dim
      S(E.bignum,{ text:String(i+1), left:px(760), top:px(150), width:px(490), height:px(440),
        fontSize:px(440), color:'var(--gold)', opacity:.12, transform:'none' });
      E.bignum.style.textAlign='right';

      // label (MISTAKE 0X) sits above the morphing title, gold
      S(E.label,{ text:'MISTAKE '+pad(i+1), left:px(90), top:px(296), width:px(600), fontSize:px(23),
        color:'var(--gold)', opacity:1 });

      // TITLE = the mistake text, centered-left, big
      S(E.title,{ text:items[i], left:px(90), top:px(330), width:px(720), fontSize:px(62), opacity:1, color:'var(--paper)' });

      // money + story + info parked off-state (invisible, positioned where they'll enter from)
      S(E.money,{ opacity:0, left:px(820), top:px(250), width:px(380), fontSize:px(130) });
      S(E.moneycap,{ opacity:0, left:px(820), top:px(400), width:px(380), fontSize:px(20) });
      S(E.story,{ opacity:0, left:px(90), top:px(470), fontSize:px(23) });
      S(E.info,{ opacity:0, left:px(90), top:px(560) });
      S(E.fixline,{ opacity:0, left:px(90), top:px(330), fontSize:px(52) });
      S(E.fixsub,{ opacity:0, left:px(90), top:px(560), fontSize:px(21) });
      S(E.mathrow,{ opacity:0 });

      setTicks(i); E.counter.textContent=pad(i+1)+' / 07'; E.counter.style.opacity=.75;
      E.ticks.forEach(t=>t.style.opacity=1); E.counter.style.opacity=.75;
    };
  }
  // ---- DIVE into mistake 2: denied claims left to die in a pile ----

  // State A — SENT & FORGOTTEN. The claim card appears fresh; clock starts. Short caption.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'3', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:0 });
    buildClaim(); claimPhase('fresh',{forward});
    // card sits right-center, clock to its right
    S(E.claimcard,{ opacity:1, left:px(620), top:px(250), width:px(520) });
    const clk=document.getElementById('claimClock'); if(clk){ clk.style.left='540px'; clk.style.top='40px'; }
    // short caption left
    S(E.storyt,{ html:"You send it.<br>You assume it'll get paid.<br><span class='hl'>You move on.</span>" });
    const w=stage.querySelector('#story .w'); if(w) w.style.opacity='0';
    S(E.story,{ opacity:1, left:px(90), top:px(270), width:px(480), fontSize:px(40) });
    E.storyt.style.fontSize='44px'; E.storyt.style.lineHeight='1.45';
    setTicks(2); E.counter.textContent='03 / 07';
  });

  // State B — SITTING UNPAID. Same card, now aging; clock advanced. Nothing flagged it.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'3', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    buildClaim(); claimPhase('aging',{forward});
    S(E.claimcard,{ opacity:1, left:px(620), top:px(250), width:px(520) });
    const clk=document.getElementById('claimClock'); if(clk){ clk.style.left='540px'; clk.style.top='40px'; }
    S(E.storyt,{ html:"Weeks later it's <span class='hl'>still sitting there.</span><br>Nobody noticed &mdash;<br><b>nothing told you to look.</b>" });
    S(E.story,{ opacity:1, left:px(90), top:px(255), width:px(490), fontSize:px(38) });
    E.storyt.style.fontSize='40px'; E.storyt.style.lineHeight='1.4';
  });

  // State C — THE HIDDEN REASON SURFACES. The stamp emerges on the card.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'3', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    buildClaim(); claimPhase('problem',{stamp:'No reply',forward});
    document.getElementById('claimCardEl').classList.remove('lost');
    S(E.claimcard,{ opacity:1, left:px(620), top:px(250), width:px(520), transform:'none' });
    const clk=document.getElementById('claimClock'); if(clk){ clk.style.left='540px'; clk.style.top='40px'; clk.style.opacity='1'; }
    S(E.label,{ html:'It never came back on a remittance', left:px(90), top:px(196), width:px(490), fontSize:px(22), color:'var(--gold)', opacity:1 });
    S(E.storyt,{ html:"You sent the bill. The remittances come back &mdash; the checks the payer pays out &mdash; and it's <b>not on any of them.</b> Not paid, not denied. So it gets forgotten." });
    S(E.story,{ opacity:1, left:px(90), top:px(270), width:px(500), fontSize:px(33) });
    E.storyt.style.fontSize='33px'; E.storyt.style.lineHeight='1.45';
  });

  // State D — THE DECAY. The aging timeline: it ages past the deadline and it's lost.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'3', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'And the longer it sits\u2026', left:px(90), top:px(150), width:px(900), fontSize:px(26), color:'var(--gold)', opacity:1 });
    // the SAME card from the previous beats stays on screen, shrinks, and docks
    // at the left end of the timeline — so it's one continuous object, not a new metaphor.
    buildClaim(); claimPhase('problem',{stamp:'No reply',forward:false});
    document.getElementById('claimCardEl').classList.remove('lost');
    const clk=document.getElementById('claimClock'); if(clk) clk.style.opacity='0';
    S(E.claimcard,{ opacity:1, left:px(90), top:px(250), width:px(280), transform:'scale(.52)' });
    E.claimcard.style.transformOrigin='left top';
    buildAging();
    S(E.aging,{ opacity:1, left:px(340), top:px(330), width:px(860) });
    runAging(forward);
  });

  // ---- THE FIX (the turn: rust→gold). The concrete action + method, one slide. ----
  states.push(()=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 03'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'3', left:px(820), top:px(120), width:px(440), height:px(560), fontSize:px(560), opacity:.10 });
    S(E.fixline,{ html:M3.fix, opacity:1, left:px(90), top:px(230), width:px(880), fontSize:px(60) });
    S(E.fixsub,{ html:M3.fixsub, opacity:1, left:px(90), top:px(400), width:px(880), fontSize:px(26), lineHeight:'1.5' });
  });

  // ---- THE COST: claims that slip through the cracks. Money falls in. ----
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'3', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:0 });
    S(E.label,{ html:'They slip through the cracks', left:px(90), top:px(96), width:px(900), fontSize:px(40), color:'var(--gold)', opacity:1 });
    S(E.fixsub,{ html:"Claims that were never paid, never denied, never recouped &mdash; <b>just an error on the payer's side.</b> No flag, no notice. They quietly fall through.", opacity:1, left:px(90), top:px(166), width:px(720), fontSize:px(24), lineHeight:'1.5', color:'#C9B9B2' });
    buildCrack();
    S(E.crackscene,{ opacity:1, left:px(90), top:px(200), width:px(1100), height:px(520) });
    runCrack(forward);
  });

  // ---- crack scene builder + runner ----
  function buildCrack(){
    if(E.crackscene.dataset.built) return;
    const bills=[
      {amt:'$1,240', dx:-150, r0:-8, r1:-22, d:0.0},
      {amt:'$880',  dx:40,   r0:6,  r1:18,  d:0.5},
      {amt:'$2,310', dx:-40,  r0:-3, r1:-10, d:1.0},
      {amt:'$640',  dx:130,  r0:10, r1:26,  d:1.5},
    ].map(b=>`<div class="bill" style="--dx:${b.dx}px;--r0:${b.r0}deg;--r1:${b.r1}deg;--d:${b.d}s">
        <div class="bt">Unpaid claim</div><div class="bv">${b.amt}</div></div>`).join('');
    E.crackscene.innerHTML=`
      <div class="floor"></div>
      <div class="glow"></div>
      <div class="crack"><svg viewBox="0 0 560 34" preserveAspectRatio="none">
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17
                 L510 18 L455 28 L400 16 L340 26 L285 12 L230 27 L175 15 L120 25 L70 19 L0 17 Z"
              fill="#0a0305"/>
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17"
              fill="none" stroke="rgba(47,125,91,.35)" stroke-width="1"/>
      </svg></div>
      ${bills}`;
    E.crackscene.dataset.built='1';
  }
  function runCrack(forward){
    E.crackscene.classList.remove('run','rest');
    // force reflow so re-adding 'run' restarts the animation
    void E.crackscene.offsetWidth;
    if(forward){ E.crackscene.classList.add('run'); }
    else { E.crackscene.classList.add('rest'); }
  }

  // ---- the persistent claim card: built once, morphed per beat ----
  function buildClaim(){
    if(E.claimcard.dataset.built) return;
    E.claimcard.innerHTML=`
      <div class="card" id="claimCardEl">
        <div class="dust"></div>
        <div class="stamp" id="claimStamp">Denied</div>
        <div class="ct">Claim &middot; #4471</div>
        <div class="camt">$1,240</div>
        <div class="crow"><span class="clabel">Status</span><span class="cstatus" id="claimStatus">Submitted</span></div>
      </div>
      <div class="clock" id="claimClock">
        <div class="clockface"><div class="sweep" id="claimSweep"></div><div class="clockhand" id="claimHand"></div></div>
        <div class="clocklabel" id="claimClockLab">Day 1</div>
      </div>`;
    E.claimcard.dataset.built='1';
  }
  // phase: 'fresh' | 'aging' | 'problem' (clock + status + stamp + age handled here)
  function claimPhase(phase, opts){
    opts=opts||{};
    const card=document.getElementById('claimCardEl');
    const status=document.getElementById('claimStatus');
    const hand=document.getElementById('claimHand');
    const sweep=document.getElementById('claimSweep');
    const clockLab=document.getElementById('claimClockLab');
    const stamp=document.getElementById('claimStamp');
    card.classList.remove('aging','problem','lost','revived');
    // each beat = an angle. hand points there; sweep fills the arc up to there.
    const beat={ fresh:20, aging:220, problem:300 };
    const deg=beat[phase];
    // when not arriving forward (back-nav / jump), kill the transition so it snaps
    const fwd = opts.forward!==false;
    hand.style.transition  = fwd ? '' : 'none';
    sweep.style.transition = fwd ? '' : 'none';
    hand.style.transform='translate(-50%,-100%) rotate('+deg+'deg)';
    sweep.style.setProperty('--swept', deg+'deg');
    if(!fwd){ // force the snap to commit, then restore transitions for the next forward move
      void hand.offsetWidth; hand.style.transition=''; sweep.style.transition=''; }
    if(phase==='fresh'){ status.textContent='Submitted'; clockLab.textContent='Day 1'; }
    if(phase==='aging'){ card.classList.add('aging'); status.textContent='Unpaid \u00b7 unnoticed'; clockLab.textContent='Day 45'; }
    if(phase==='problem'){ card.classList.add('problem'); status.textContent='No reply \u00b7 70 days'; stamp.textContent=opts.stamp||'No reply'; clockLab.textContent='Day 70'; }
  }

  function buildAging(){
    if(E.aging.dataset.built) return;
    E.aging.innerHTML=`
      <div class="agrow">
        <div class="agname">Claim #4471 &middot; <b>$1,240</b></div>
        <div class="agout">harder to recover every week</div>
      </div>
      <div class="agtrack">
        <div class="agfill"></div>
        <div class="aglost">Still recoverable</div>
      </div>
      <div class="agaxis"><span>Fresh</span><span>Harder to recover</span><span>Harder still</span></div>
      <div class="agnote">No reply doesn't mean lost. <span class="ok">If they never answered, you can still call on it &mdash; sometimes even past the usual filing window.</span> But every week it sits, <span class="bad">it only gets harder to chase down.</span></div>`;
    E.aging.dataset.built='1';
  }
  function runAging(forward){
    const fill=E.aging.querySelector('.agfill');
    const lost=E.aging.querySelector('.aglost');
    const note=E.aging.querySelector('.agnote');
    if(forward){
      fill.style.transitionDuration='0s'; fill.style.width='0'; lost.classList.remove('show'); note.classList.remove('in');
      later(()=>{ fill.style.transitionDuration='2.6s'; fill.style.width='100%'; }, 80);
      later(()=>lost.classList.add('show'), 2000);
      later(()=>note.classList.add('in'), 1600);
    } else {
      fill.style.transitionDuration='0s'; fill.style.width='100%'; lost.classList.add('show'); note.classList.add('in');
    }
  }

  // ---- money count-up (kept from engine, unused here but harmless) ----
  const easeOut=p=>1-Math.pow(1-p,3);
  let moneyRAF=null;
  function countUp(node,peak){ cancelAnimationFrame(moneyRAF); let t0=null; const dur=1400;
    (function s(ts){ if(!t0)t0=ts; let p=Math.min(1,(ts-t0)/dur);
      node.textContent='$'+Math.round(peak*easeOut(p)).toLocaleString();
      if(p<1) moneyRAF=requestAnimationFrame(s);
    })(performance.now()); }



  // ---- controller: cancel pending timers on every change; pass direction so
  //      animations only play going FORWARD. Backward/jumps snap to resting state. ----
  let pendingTimers=[];
  function clearTimers(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[];
    cancelAnimationFrame(moneyRAF); }
  function later(fn,ms){ const t=setTimeout(fn,ms); pendingTimers.push(t); return t; }

  let i=-1;
  function go(n, forward){ if(n<0||n>=states.length) return;
    clearTimers(); i=n; states[i](forward);
    parent.postMessage({deck:1, type:'pos', idx:i, total:states.length}, '*');
  }
  function next(){ if(i<states.length-1){ go(i+1, true); } else { parent.postMessage({deck:1, type:'chapterEnd'}, '*'); } }
  function back(){ if(i>0){ go(i-1, false); } else { parent.postMessage({deck:1, type:'chapterStart'}, '*'); } }
  go(0);
  document.getElementById('click').addEventListener('click', next);
  stage.tabIndex=0;
  // parent drives navigation; listen for commands
  window.addEventListener('message', e=>{
    const m=e.data||{}; if(!m.deckcmd) return;
    if(m.deckcmd==='next') next();
    else if(m.deckcmd==='back') back();
    else if(m.deckcmd==='first') go(0, true);
    else if(m.deckcmd==='last') go(states.length-1, true);
  });
  // also allow local keys to bubble to parent for resilience
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); back(); }
    else if(e.key.toLowerCase()==='f'){ parent.postMessage({deck:1,type:'fs'},'*'); }
  });
})();

<\/script>

<script type="text/html" id="chap3"><meta charset="utf-8">
<!-- ABA — ONE continuous canvas. Persistent elements morph between states on each click. -->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  *{ box-sizing:border-box; margin:0; padding:0; }

  /* every persistent element is absolutely placed and transitions ALL geometry */
  .el{ position:absolute; transition:
      left var(--dur) var(--ease), top var(--dur) var(--ease),
      width var(--dur) var(--ease), height var(--dur) var(--ease),
      font-size var(--dur) var(--ease), opacity .6s ease, color .5s ease,
      transform var(--dur) var(--ease), letter-spacing var(--dur) var(--ease);
    will-change:left,top,font-size,opacity; }

  /* the eyebrow / kicker */
  #eyebrow{ font-weight:700; letter-spacing:.4em; text-transform:uppercase; white-space:nowrap;
    display:flex; align-items:center; z-index:5; }
  #eyebrow .line{ display:inline-block; width:42px; height:2px; margin-right:16px; flex:none;

  /* the BIG number — travels from center-stage hero to ghost-right */

  /* the TITLE — morphs from map label to mistake headline */
  #title{ font-family:var(--head); font-weight:800; line-height:1.05; letter-spacing:-.015em;
    color:var(--paper); z-index:4; }

  /* the small label above title (MISTAKE 0X) */
  #label{ font-family:var(--head); font-weight:800; letter-spacing:.06em; z-index:4; }

  /* money figure (lives off-stage until mistake) */
  #money{ font-family:var(--head); font-weight:900; line-height:.9; color:var(--gold);

  /* story + info (enter on later mistake states) */

  #story .t{ font-family:var(--head); font-weight:700; color:var(--paper); opacity:.95; font-size:27px; line-height:1.4; }
  #story .t b{ font-weight:900; color:#fff; }

  #info{ z-index:4; display:flex; gap:18px; align-items:flex-start; width:980px; }
  #info .dot{ flex:none; width:40px; height:40px; border-radius:50%; background:rgba(47,125,91,.14);
    border:1px solid rgba(47,125,91,.4); display:flex; align-items:center; justify-content:center;

  #info .it{ font-style:italic; color:var(--papmut); line-height:1.5; padding-top:6px; font-size:20px; }

  /* fix line (the resolution) + supporting detail */
  #fixline{ font-family:var(--head); font-weight:800; line-height:1.15; letter-spacing:-.01em;

  /* the math breakdown: factors with a "why" label under each */

  #mathrow .eqval{ font-family:var(--head); font-weight:800; font-size:38px; color:var(--gold);
    line-height:1; text-shadow:0 0 20px rgba(47,125,91,.4); }

  /* four outcomes: 2x2, good ones calm, bad ones heavier with glow */
  #outcomes{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  #outcomes .oc{ border-radius:14px; padding:18px 24px; position:relative;

    background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); }
  #outcomes .oc.in{ opacity:1; transform:none; }
  #outcomes .oc.bad{ background:rgba(181,82,74,.10); border-color:rgba(181,82,74,.45);

    text-transform:uppercase; color:var(--papmut); margin-bottom:8px; }
  #outcomes .oc.bad .tag{ color:var(--rust); }
  #outcomes .oc.good .tag{ color:var(--teal); }
  #outcomes .oc .h{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper);
    line-height:1.1; margin-bottom:8px; }
  #outcomes .oc .d{ font-size:15px; line-height:1.4; color:var(--papmut); }
  #outcomes .oc .amt{ color:var(--rust); font-weight:700; }

  /* hours increase visual: two bars, before (2hr) and after (4hr, gold, taller) */
  #hoursviz{ display:flex; align-items:flex-end; gap:34px; z-index:4; }
  #hoursviz .col{ display:flex; flex-direction:column; align-items:center; }
  #hoursviz .bar{ width:90px; border-radius:10px 10px 4px 4px; transition:height .7s var(--ease); }
  #hoursviz .before .bar{ height:110px; background:rgba(255,255,255,.16); }
  #hoursviz .after .bar{ height:220px; background:linear-gradient(180deg,var(--gold),#1F5B40);
    box-shadow:0 0 40px rgba(47,125,91,.35); }
  #hoursviz .num{ font-family:var(--head); font-weight:900; font-size:40px; line-height:1; margin-bottom:14px; }
  #hoursviz .before .num{ color:var(--papmut); }
  #hoursviz .after .num{ color:var(--gold); }
  #hoursviz .cap{ font-family:var(--body); font-weight:600; font-size:14px; color:var(--papmut);
    margin-top:14px; letter-spacing:.04em; }
  #hoursviz .arrow{ align-self:center; font-family:var(--head); font-weight:800; font-size:40px;
    color:var(--rust); padding-bottom:80px; }

  /* depletion race: same unit pool, two bars draining at different rates */
  #burndown{ z-index:4; width:1000px; }
  #burndown .row{ margin-bottom:34px; }
  #burndown .rl{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  #burndown .rl .name{ font-family:var(--head); font-weight:700; font-size:22px; color:var(--paper); }
  #burndown .rl .name b{ color:var(--gold); }
  #burndown .rl .out{ font-family:var(--body); font-weight:600; font-size:15px; color:var(--papmut); }
  #burndown .rl .out.danger{ color:var(--rust); font-weight:700; }
  /* the track = full 6-month pool */
  #burndown .track{ position:relative; height:30px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; }
  /* the fill = units consumed, drains across */
  #burndown .fill{ position:absolute; left:0; top:0; bottom:0; border-radius:8px 0 0 8px;
    transition:width 1.1s var(--ease); }
  #burndown .fill.slow{ background:linear-gradient(90deg,var(--teal),#1f5f5b); width:0; }
  #burndown .fill.fast{ background:linear-gradient(90deg,var(--gold),#1F5B40); width:0;
    box-shadow:0 0 24px rgba(47,125,91,.3); }
  /* the uncovered zone on the fast track (month 3→6) */
  #burndown .uncovered{ position:absolute; top:0; bottom:0; right:0; width:50%;
    background:repeating-linear-gradient(45deg, rgba(181,82,74,.16) 0 8px, transparent 8px 16px);
    border-left:2px dashed rgba(181,82,74,.6); opacity:0; transition:opacity .5s ease .6s; }
  #burndown .uncovered.show{ opacity:1; }
  #burndown .uncovered .ulab{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--rust); white-space:nowrap; }
  /* month axis */
  #burndown .axis{ display:flex; justify-content:space-between; margin-top:8px;
    font-family:var(--body); font-size:13px; color:var(--papmut); opacity:.6; }

  /* money flow: pays RBT (out) vs reimbursement (denied) → lost revenue if not caught */
  #moneyflow{ z-index:4; width:1080px; }
  #moneyflow .step{ display:flex; align-items:center; gap:22px; margin-bottom:26px;
    opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #moneyflow .step.in{ opacity:1; transform:none; }
  #moneyflow .node{ flex:none; min-width:200px; padding:18px 22px; border-radius:12px; text-align:center;
    font-family:var(--head); font-weight:700; font-size:21px; color:var(--paper);
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
  #moneyflow .flow{ font-family:var(--head); font-weight:800; font-size:26px; white-space:nowrap; }
  #moneyflow .amt{ font-family:var(--head); font-weight:900; font-size:30px; font-variant-numeric:tabular-nums; }
  #moneyflow .desc{ font-family:var(--body); font-weight:500; font-size:17px; line-height:1.4; color:var(--papmut); }
  /* out = money leaving, certain (teal) */
  #moneyflow .out .flow{ color:var(--teal); }
  #moneyflow .out .amt{ color:var(--paper); }
  /* back = reimbursement blocked (rust) */
  #moneyflow .back .flow{ color:var(--rust); }
  #moneyflow .back .amt{ color:var(--rust); }
  #moneyflow .back .node.denied{ border-color:rgba(181,82,74,.5); background:rgba(181,82,74,.1);
    color:var(--rust); position:relative; }
  /* the lost total */
  #moneyflow .lost{ margin-top:8px; padding-top:22px; border-top:1px solid rgba(255,255,255,.1);
    display:flex; align-items:baseline; gap:16px;
    opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #moneyflow .lost.in{ opacity:1; transform:none; }
  #moneyflow .lost .lt{ font-family:var(--body); font-weight:600; font-size:19px; color:var(--papmut); }
  #moneyflow .lost .lv{ font-family:var(--head); font-weight:900; font-size:48px; color:var(--gold);
    text-shadow:0 0 30px rgba(47,125,91,.4); }
  #moneyflow .lost .cond{ font-family:var(--body); font-weight:600; font-size:16px; font-style:italic;
    color:var(--rust); }

  /* highlight for stat lines */
  .hl2{ color:var(--gold); font-weight:700; }
  #moneycap b{ color:var(--paper); font-weight:700; }

  /* denial pile: claims stacking up unworked */
  #pile{ z-index:4; }
  #pile .pilelabel{ font-family:var(--body); font-weight:700; font-size:14px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--rust); margin-bottom:16px; }
  #pile .claim{ display:flex; align-items:center; gap:12px; padding:14px 18px; margin-bottom:10px;
    border-radius:10px; background:rgba(181,82,74,.10); border:1px solid rgba(181,82,74,.4);
    font-family:var(--head); font-weight:700; font-size:18px; color:var(--paper);
    opacity:0; transform:translateY(-14px); transition:opacity .4s var(--ease), transform .4s var(--ease); }
  #pile .claim.in{ opacity:1; transform:none; }
  #pile .claim .cx{ color:var(--rust); font-weight:900; font-size:22px; }

  /* deadline window: refile clock running out */
  #deadline{ z-index:4; width:1010px; }
  #deadline .dlrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #deadline .dlname{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper); }
  #deadline .dlout{ font-family:var(--body); font-weight:600; font-size:17px; color:var(--rust); }
  #deadline .dltrack{ position:relative; height:34px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); overflow:hidden; margin-bottom:40px; }
  #deadline .dlfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:8px 0 0 8px;
    background:linear-gradient(90deg, rgba(74,120,196,.5), var(--rust)); }
  #deadline .dlflag{ position:absolute; top:42px; font-family:var(--body); font-weight:600; font-size:14px;
    color:var(--papmut); }
  #deadline .dlflag-start{ left:0; }
  #deadline .dlflag-end{ right:0; color:var(--rust); }
  #deadline .dlnote{ font-family:var(--body); font-size:21px; line-height:1.5; color:var(--papmut);
    opacity:0; transform:translateY(12px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #deadline .dlnote.in{ opacity:1; transform:none; }
  #deadline .dlnote .ok{ color:var(--teal); font-weight:700; }
  #deadline .dlnote .bad{ color:var(--rust); font-weight:700; }

  /* aging claim: one claim ages across a timeline, recoverability dropping, crosses the deadline cliff */
  #aging{ z-index:4; width:1010px; }
  #aging .agrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #aging .agname{ font-family:var(--head); font-weight:700; font-size:24px; color:var(--paper); }
  #aging .agname b{ color:var(--gold); }
  #aging .agout{ font-family:var(--body); font-weight:600; font-size:17px; color:var(--rust); }
  #aging .agtrack{ position:relative; height:40px; border-radius:8px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); margin-bottom:8px; overflow:visible; }
  /* the fill = the claim aging from fresh (gold) to harder-to-recover (rust), but never "gone" */
  #aging .agfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:8px;
    background:linear-gradient(90deg, var(--gold) 0%, #c98a2e 50%, var(--rust) 100%); max-width:100%; }
  /* the "still recoverable" reassurance tag, riding the end of the fill */
  #aging .aglost{ position:absolute; top:11px; right:16px; font-family:var(--body); font-weight:800;
    font-size:14px; letter-spacing:.08em; text-transform:uppercase; color:#fff;
    opacity:0; transition:opacity .5s ease; z-index:4; text-shadow:0 1px 4px rgba(0,0,0,.55); }
  #aging .aglost.show{ opacity:1; }
  #aging .agaxis{ display:flex; justify-content:space-between; margin-top:44px;
    font-family:var(--body); font-size:14px; color:var(--papmut); opacity:.7; }
  #aging .agnote{ font-family:var(--body); font-size:21px; line-height:1.5; color:var(--papmut);
    margin-top:24px; opacity:0; transform:translateY(12px); transition:opacity .5s var(--ease), transform .5s var(--ease); }
  #aging .agnote.in{ opacity:1; transform:none; }
  #aging .agnote .bad{ color:var(--rust); font-weight:700; }
  #aging .agnote .ok{ color:var(--teal); font-weight:700; }

  /* ===== the persistent CLAIM CARD that lives through the whole unit ===== */
  #claimcard{ z-index:4; width:520px; }
  #claimcard .card{ position:relative; border-radius:16px; padding:30px 32px;
    background:rgba(244,241,234,.94); box-shadow:0 24px 60px rgba(0,0,0,.45);
    transition:transform .9s var(--ease), filter .9s var(--ease), opacity .6s var(--ease); }
  #claimcard .card .ct{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.16em;
    text-transform:uppercase; color:#9a8f80; margin-bottom:14px; }
  #claimcard .card .camt{ font-family:var(--head); font-weight:900; font-size:46px; color:#1a1410; line-height:1; }
  #claimcard .card .crow{ display:flex; justify-content:space-between; align-items:baseline; margin-top:18px;
    padding-top:16px; border-top:1px solid rgba(0,0,0,.12); }
  #claimcard .card .clabel{ font-family:var(--body); font-weight:600; font-size:15px; color:#6b6155; }
  #claimcard .card .cstatus{ font-family:var(--body); font-weight:800; font-size:15px; letter-spacing:.06em;
    text-transform:uppercase; color:#3a8a4a; transition:color .6s ease; }
  /* age states tint & desaturate the card */
  #claimcard .card.aging{ filter:sepia(.45) brightness(.92); transform:rotate(-1deg); }
  #claimcard .card.problem{ filter:sepia(.6) brightness(.88); transform:rotate(-1.5deg); }
  #claimcard .card.lost{ filter:grayscale(.85) brightness(.6); transform:rotate(-3deg) scale(.96); }
  #claimcard .card.revived{ filter:none; transform:none; box-shadow:0 24px 70px rgba(47,125,91,.3); }
  #claimcard .card.aging .cstatus{ color:#c98a2e; }
  #claimcard .card.problem .cstatus{ color:var(--rust); }
  #claimcard .card.lost .cstatus{ color:#8a8a8a; }
  #claimcard .card.revived .cstatus{ color:#3a8a4a; }
  /* a "dust"/age overlay that grows */
  #claimcard .card .dust{ position:absolute; inset:0; border-radius:16px; pointer-events:none;
    background:repeating-linear-gradient(45deg, rgba(120,90,60,.08) 0 6px, transparent 6px 12px);
    opacity:0; transition:opacity .9s ease; }
  #claimcard .card.aging .dust{ opacity:.5; }
  #claimcard .card.problem .dust{ opacity:.8; }
  #claimcard .card.lost .dust{ opacity:1; }
  /* the hidden problem stamp that surfaces */
  #claimcard .card .stamp{ position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-12deg) scale(1.3); transform-origin:center;
    font-family:var(--head); font-weight:900; font-size:30px; letter-spacing:.04em;
    color:var(--rust); border:4px solid var(--rust); border-radius:10px; padding:8px 20px;
    text-transform:uppercase; opacity:0; transition:opacity .5s ease, transform .5s var(--ease); }
  #claimcard .card.problem .stamp{ opacity:.92; transform:translate(-50%,-50%) rotate(-12deg) scale(1); }
  #claimcard .card.lost .stamp{ opacity:.55; transform:translate(-50%,-50%) rotate(-12deg) scale(1); }

  @property --swept{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
  /* the ticking clock beside the card */
  #claimcard .clock{ position:absolute; }
  #claimcard .clockface{ width:88px; height:88px; border-radius:50%; border:4px solid var(--papmut);
    position:relative; opacity:.85; }
  #claimcard .clockhand{ position:absolute; left:50%; top:50%; width:3px; height:32px; background:var(--rust);
    transform-origin:bottom center; transform:translate(-50%,-100%) rotate(0deg);
    border-radius:3px; transition:transform 1.1s var(--ease); }
  /* a faint trailing arc that fills as the hand sweeps, so elapsed time reads as area */
  #claimcard .clockface .sweep{ position:absolute; inset:-4px; border-radius:50%;
    background:conic-gradient(from 0deg, rgba(181,82,74,.22) 0deg, rgba(181,82,74,.22) var(--swept,0deg), transparent var(--swept,0deg));
    transition:--swept 1.1s var(--ease); }
  #claimcard .clocklabel{ font-family:var(--body); font-weight:700; font-size:13px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--papmut); margin-top:12px; text-align:center; }

  /* big caption line beneath the claim story */
  #claimcap{ }

  /* ===== final beat: money slipping through the crack ===== */
  #crackscene{ z-index:4; width:1100px; height:520px; pointer-events:none; }
  /* the floor the crack splits */
  #crackscene .floor{ position:absolute; left:0; right:0; bottom:170px; height:2px;
    background:linear-gradient(90deg, transparent, rgba(244,241,234,.18) 20%, rgba(244,241,234,.18) 80%, transparent); }
  /* the crack itself: a dark jagged gap with a faint inner glow */

    width:560px; height:44px; }

  /* the glow rising from inside the crack */
  #crackscene .glow{ position:absolute; left:50%; bottom:158px; transform:translateX(-50%);
    width:440px; height:140px; border-radius:50%;
    background:radial-gradient(ellipse at center bottom, rgba(47,125,91,.32), rgba(181,82,74,.14) 45%, transparent 70%);
    filter:blur(7px); opacity:.92; }
  /* each falling bill = a small claim chit */
  #crackscene .bill{ position:absolute; left:50%; top:-40px; width:128px; height:62px; border-radius:8px;
    background:linear-gradient(145deg, #f4f1ea, #e4ddc8); box-shadow:0 10px 24px rgba(0,0,0,.4);

  #crackscene .bill .bt{ font-family:var(--body); font-weight:700; font-size:9px; letter-spacing:.14em;
    text-transform:uppercase; color:#9a8f80; }
  #crackscene .bill .bv{ font-family:var(--head); font-weight:900; font-size:24px; color:#1a1410; line-height:1; }
  /* the fall+vanish animation: bill falls to the crack and sinks in, shrinking to nothing */

    80%{  opacity:1; transform:translate(calc(-50% + var(--dx,0px)*1.05), 300px) rotate(var(--r1,0deg)) scale(.5); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx,0px)*1.05), 322px) rotate(var(--r1,0deg)) scale(.12); }
  }
  #crackscene.run .bill{ animation:fallIn 2.6s var(--ease) forwards; animation-delay:var(--d,0s); }
  /* the crack and glow sit ABOVE the falling bills so money disappears behind the lip */
  #crackscene .crack, #crackscene .glow{ z-index:3; }
  #crackscene .bill{ z-index:2; }
  /* resting (back-nav): bills sit gone, glow steady */
  #crackscene.rest .bill{ opacity:0; }

  /* ===== mistake 4: the session ↔ claim link ===== */
  #linkscene{ z-index:4; width:1100px; height:360px; }
  #linkscene .lcard{ position:absolute; top:40px; width:340px; border-radius:16px; padding:26px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,.42); transition:transform .8s var(--ease), opacity .6s var(--ease), filter .8s var(--ease); }
  /* session card (the WORK) — left, paper like a note */
  #linkscene .session{ left:0; background:rgba(244,241,234,.95); }
  #linkscene .session .lk{ font-family:var(--body); font-weight:700; font-size:12px; letter-spacing:.16em;

  #linkscene .session .lt{ font-family:var(--head); font-weight:900; font-size:26px; color:#1a1228; line-height:1.05; }
  #linkscene .session .lrow{ display:flex; justify-content:space-between; margin-top:16px; padding-top:14px;
    border-top:1px solid rgba(0,0,0,.1); font-family:var(--body); font-size:14px; }
  #linkscene .session .lrow .a{ color:#6b6178; font-weight:600; } #linkscene .session .lrow .b{ color:#1a1228; font-weight:700; }
  /* claim card (the BILL) — right, plum-tinted */
  #linkscene .claim{ right:0; background:linear-gradient(150deg, rgba(155,123,212,.16), rgba(155,123,212,.06));
    border:1px solid rgba(155,123,212,.4); }
  #linkscene .claim .lk{ font-family:var(--body); font-weight:700; font-size:12px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--teal); margin-bottom:12px; }
  #linkscene .claim .lt{ font-family:var(--head); font-weight:900; font-size:40px; color:var(--paper); line-height:1; }
  #linkscene .claim .lrow{ display:flex; justify-content:space-between; margin-top:16px; padding-top:14px;
    border-top:1px solid rgba(255,255,255,.12); font-family:var(--body); font-size:14px; }
  #linkscene .claim .lrow .a{ color:var(--papmut); font-weight:600; } #linkscene .claim .lrow .b{ color:var(--paper); font-weight:700; }
  /* the connecting thread between them */
  #linkscene .thread{ position:absolute; top:118px; left:340px; width:420px; height:80px; z-index:1; pointer-events:none; }
  #linkscene .thread svg{ width:100%; height:100%; overflow:visible; }
  #linkscene .thread .line{ stroke:var(--gold); stroke-width:3; fill:none;
    stroke-dasharray:520; stroke-dashoffset:520; transition:stroke-dashoffset 1s var(--ease), stroke .5s, opacity .5s;
    filter:drop-shadow(0 0 8px rgba(47,125,91,.5)); }
  #linkscene.tied .thread .line{ stroke-dashoffset:0; }
  #linkscene .thread .knot{ fill:var(--gold); opacity:0; transition:opacity .5s; }
  #linkscene.tied .thread .knot{ opacity:1; }
  /* the SEVERED state: thread vanishes, snapped ends show */
  #linkscene.cut .thread .line{ opacity:0; }
  #linkscene .thread .snap{ opacity:0; transition:opacity .4s; }
  #linkscene.cut .thread .snap{ opacity:1; }
  #linkscene .thread .snap line{ stroke:var(--rust); stroke-width:3; filter:drop-shadow(0 0 6px rgba(194,91,168,.5)); }
  #linkscene.cut .claim{ filter:grayscale(.35) brightness(.92); }
  #linkscene.cut .claim .lt{ color:var(--papmut); }
  /* a floating "?" over the orphaned claim */
  #linkscene .qmark{ position:absolute; top:6px; right:130px; font-family:var(--head); font-weight:900;
    font-size:80px; color:var(--rust); opacity:0; transform:scale(.6) rotate(-8deg);
    transition:opacity .5s var(--ease), transform .5s var(--ease); text-shadow:0 0 30px rgba(194,91,168,.5); z-index:3; }
  #linkscene.cut .qmark{ opacity:.95; transform:scale(1) rotate(-8deg); }

  #ticks{ position:absolute; left:90px; bottom:74px; display:flex; gap:16px; align-items:center; z-index:5; }
  .tick{ width:60px; height:5px; border-radius:3px; background:rgba(255,255,255,.13);
    transition:background .5s, box-shadow .5s, transform .4s; }
  .tick.done{ background:rgba(47,125,91,.38); }
  .tick.active{ background:var(--gold); box-shadow:0 0 16px rgba(47,125,91,.7); transform:scaleY(1.8); }

  #counter{ position:absolute; right:90px; bottom:70px; font-family:var(--head); font-weight:700;
    font-size:19px; color:var(--papmut); z-index:5; letter-spacing:.06em; opacity:.75; }
  #hint{ position:absolute; bottom:30px; left:90px; font-size:13px; color:var(--papmut); opacity:.4; z-index:5; }
  #click{ position:absolute; inset:0; z-index:6; cursor:pointer; }
  .hidden{ opacity:0 !important; }
</style>

<script>
(function(){
  const stage=document.getElementById('stage'), frame=document.getElementById('frame');
  function fit(){ const s=Math.min(window.innerWidth/1280, window.innerHeight/720); stage.style.transform='scale('+s+')'; }
  window.addEventListener('resize',fit); fit();

  const items=[
    "Not staying on top of authorized units","Not reworking denied claims","Ignoring aging claims",
    "Not tying sessions to claims","Not keeping a record on every claim","Not fixing denials at the source",
    "Notes that don't match the claims"
  ];
  const M4={
    fix:"Tie each session to the claim it billed.",
    fixsub:"Then every claim <b>traces straight back to the work that earned it</b> &mdash; and when a claim gets called on, it's clear exactly where it came from." };
  const pad=n=>String(n).padStart(2,'0');

  // build persistent elements ONCE
  stage.insertAdjacentHTML('beforeend',`
    <div class="el" id="eyebrow"><span class="line"></span><span class="ebtext"></span></div>
    <div class="el" id="bignum">1</div>
    <div class="el" id="label"></div>
    <div class="el" id="title"></div>
    <div class="el" id="money"></div>
    <div class="el" id="moneycap"></div>
    <div class="el" id="story"><div class="w">What happens</div><div class="t"></div></div>
    <div class="el" id="info"><div class="dot">i</div><div class="it"></div></div>
    <div class="el" id="fixline"></div>
    <div class="el" id="fixsub"></div>
    <div class="el" id="mathrow"></div>
    <div class="el" id="outcomes"></div>
    <div class="el" id="hoursviz"></div>
    <div class="el" id="burndown"></div>
    <div class="el" id="moneyflow"></div>
    <div class="el" id="pile"></div>
    <div class="el" id="deadline"></div>
    <div class="el" id="aging"></div>
    <div class="el" id="claimcard"></div>
    <div class="el" id="crackscene"></div>
    <div class="el" id="linkscene"></div>
    <div id="ticks">${items.map((_,i)=>`<div class="tick" data-i="${i}"></div>`).join('')}</div>
    <div id="counter">01 / 07</div>
    <div id="hint">&rarr; advance &middot; &larr; back &middot; F fullscreen</div>
    <div id="click"></div>`);

  const E={ eyebrow:el('eyebrow'), ebtext:stage.querySelector('.ebtext'), ebline:stage.querySelector('#eyebrow .line'),
    bignum:el('bignum'), label:el('label'), title:el('title'), money:el('money'), moneycap:el('moneycap'),
    story:el('story'), storyt:stage.querySelector('#story .t'), info:el('info'), infot:stage.querySelector('#info .it'),
    fixline:el('fixline'), fixsub:el('fixsub'), mathrow:el('mathrow'), outcomes:el('outcomes'), hoursviz:el('hoursviz'), burndown:el('burndown'), moneyflow:el('moneyflow'), pile:el('pile'), deadline:el('deadline'), aging:el('aging'), claimcard:el('claimcard'), crackscene:el('crackscene'), linkscene:el('linkscene'),
    ticks:[...stage.querySelectorAll('.tick')], counter:el('counter') };
  function el(id){ return document.getElementById(id); }

  // set helper: apply geometry/style to an element
  function S(node, p){ for(const k in p){ if(k==='text'){ node.textContent=p.text; }
    else if(k==='html'){ node.innerHTML=p.html; } else node.style[k]=p[k]; } }
  function px(n){ return n+'px'; }

  // ----- STATE DEFINITIONS -----
  // Each state is a function that POSITIONS every persistent element for that moment.
  // Elements transition from their previous state to this one = continuous morph.

  function setTicks(activeIdx){ E.ticks.forEach((t,j)=>{ t.classList.remove('active','done');
    if(activeIdx>=0){ if(j<activeIdx)t.classList.add('done'); if(j===activeIdx)t.classList.add('active'); } }); }

  // PROTOTYPE PATH: state0 = map showing mistake 1, then dive into mistake 1's beats.
  const states=[];
  states.push(mapState(3)); // map, focused on mistake 4

  // Hide every CONTENT element. Each state calls this first, then shows only what it needs.
  // Elements keep their last position while hidden, so showing them again still morphs.
  function resetAll(){
    [E.bignum,E.label,E.title,E.money,E.moneycap,E.story,E.info,E.fixline,E.fixsub,E.mathrow,E.outcomes,E.hoursviz,E.burndown,E.moneyflow,E.pile,E.deadline,E.aging,E.claimcard,E.crackscene,E.linkscene]
      .forEach(n=>{ n.style.opacity='0'; });
  }
  // assert the rust "THE MISTAKE" eyebrow (used by all mistake-phase states)
  function mistakeEyebrow(){
    S(E.ebtext,{text:'The Mistake · 04'}); E.ebtext.style.color='var(--rust)';
    E.ebline.style.background='var(--rust)'; E.ebline.style.boxShadow='0 0 12px var(--rust)';
    S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)}); E.eyebrow.style.opacity=.95;
  }

  // map state for mistake i (0-based)
  function mapState(i){
    return ()=>{
      resetAll();
      E.eyebrow.style.opacity=1;
      S(E.ebtext,{text:'The Map · Seven mistakes, one rhythm'});
      E.ebtext.style.color='var(--gold)'; E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
      S(E.eyebrow,{left:px(90),top:px(78),fontSize:px(18)});

      // big number = ghost on the right, dim
      S(E.bignum,{ text:String(i+1), left:px(760), top:px(150), width:px(490), height:px(440),
        fontSize:px(440), color:'var(--gold)', opacity:.12, transform:'none' });
      E.bignum.style.textAlign='right';

      // label (MISTAKE 0X) sits above the morphing title, gold
      S(E.label,{ text:'MISTAKE '+pad(i+1), left:px(90), top:px(296), width:px(600), fontSize:px(23),
        color:'var(--gold)', opacity:1 });

      // TITLE = the mistake text, centered-left, big
      S(E.title,{ text:items[i], left:px(90), top:px(330), width:px(720), fontSize:px(62), opacity:1, color:'var(--paper)' });

      // money + story + info parked off-state (invisible, positioned where they'll enter from)
      S(E.money,{ opacity:0, left:px(820), top:px(250), width:px(380), fontSize:px(130) });
      S(E.moneycap,{ opacity:0, left:px(820), top:px(400), width:px(380), fontSize:px(20) });
      S(E.story,{ opacity:0, left:px(90), top:px(470), fontSize:px(23) });
      S(E.info,{ opacity:0, left:px(90), top:px(560) });
      S(E.fixline,{ opacity:0, left:px(90), top:px(330), fontSize:px(52) });
      S(E.fixsub,{ opacity:0, left:px(90), top:px(560), fontSize:px(21) });
      S(E.mathrow,{ opacity:0 });

      setTicks(i); E.counter.textContent=pad(i+1)+' / 07'; E.counter.style.opacity=.75;
      E.ticks.forEach(t=>t.style.opacity=1); E.counter.style.opacity=.75;
    };
  }
  // ---- DIVE into mistake 2: denied claims left to die in a pile ----

  // ---- DIVE into mistake 4: tying sessions to claims ----

  // State A — THE TWO HALVES. Session (work) + claim (bill), joined by a thread.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'4', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:0 });
    S(E.label,{ html:'A session, tied to the units it billed', left:px(90), top:px(120), width:px(900), fontSize:px(34), color:'var(--gold)', opacity:1 });
    S(E.fixsub,{ html:"Each provider's session connects to the units that went out on the claim. <b>Same 8 units, both sides.</b>", opacity:1, left:px(90), top:px(180), width:px(820), fontSize:px(24), lineHeight:'1.5', color:'#C9B9B2' });
    buildLink();
    setLinkPhase('tied', forward);
    S(E.linkscene,{ opacity:1, left:px(90), top:px(280), width:px(1100), height:px(360) });
    setTicks(3); E.counter.textContent='04 / 07';
  });

  // State B — IT COMES BACK UNPAID, AND THE THREAD IS GONE.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'4', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'You call on a claim that didn\u2019t pay', left:px(90), top:px(120), width:px(900), fontSize:px(34), color:'var(--gold)', opacity:1 });
    S(E.fixsub,{ html:"\u2014 and can't even tell which session it came from. Once that link is gone, <b>there's no clean way to answer for the money.</b>", opacity:1, left:px(90), top:px(180), width:px(820), fontSize:px(24), lineHeight:'1.5', color:'#C9B9B2' });
    buildLink();
    setLinkPhase('cut', forward);
    S(E.linkscene,{ opacity:1, left:px(90), top:px(280), width:px(1100), height:px(360) });
  });

  // State C — THE SCRAMBLE. Text owns the frame: the labor of reverse-engineering.
  states.push((forward)=>{
    resetAll(); mistakeEyebrow();
    S(E.bignum,{ text:'4', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.label,{ html:'Now you\u2019re digging through schedules', left:px(90), top:px(150), width:px(900), fontSize:px(30), color:'var(--gold)', opacity:1 });
    const w=stage.querySelector('#story .w'); if(w) w.style.opacity='0';
    S(E.storyt,{ html:"Trying to <b>reverse-engineer the billing</b> &mdash; just to tell which session this claim came from. Before the problem can even be worked." });
    S(E.story,{ opacity:1, left:px(90), top:px(240), width:px(900), fontSize:px(44) });
    E.storyt.style.fontSize='44px'; E.storyt.style.lineHeight='1.4';
  });

  // ---- THE FIX: tie every session to the claim it bills. Thread re-ties. ----
  states.push((forward)=>{
    resetAll();
    S(E.ebtext,{text:'The Fix · 04'}); E.ebtext.style.color='var(--gold)';
    E.ebline.style.background='var(--gold)'; E.ebline.style.boxShadow='0 0 12px var(--gold)';
    S(E.bignum,{ text:'4', left:px(880), top:px(120), width:px(400), height:px(560), fontSize:px(560), opacity:.05 });
    S(E.fixline,{ html:M4.fix, opacity:1, left:px(90), top:px(130), width:px(1000), fontSize:px(50) });
    S(E.fixsub,{ html:M4.fixsub, opacity:1, left:px(90), top:px(210), width:px(900), fontSize:px(24), lineHeight:'1.55' });
    buildLink();
    setLinkPhase('tied', forward);
    E.linkscene.style.transform='none';
    S(E.linkscene,{ opacity:1, left:px(90), top:px(360), width:px(1100), height:px(360) });
  });

  // ---- link-scene builder + phase setter ----
  function buildLink(){
    if(E.linkscene.dataset.built) return;
    E.linkscene.innerHTML=`
      <div class="lcard session">
        <div class="lk">The session</div>
        <div class="lt">RBT &middot; 2.0 hrs<br>direct therapy</div>
        <div class="lrow"><span class="a">Mar 14 &middot; Client J.</span><span class="b">8 units</span></div>
      </div>
      <div class="thread"><svg viewBox="0 0 420 80" preserveAspectRatio="none">
        <path class="line" d="M0 40 C120 40, 140 22, 210 22 S300 40, 420 40"/>
        <circle class="knot" cx="0" cy="40" r="6"/><circle class="knot" cx="420" cy="40" r="6"/>
        <g class="snap">
          <line x1="0" y1="40" x2="150" y2="30"/>
          <line x1="420" y1="40" x2="270" y2="30"/>
        </g>
      </svg></div>
      <div class="qmark">?</div>
      <div class="lcard claim">
        <div class="lk">The units billed</div>
        <div class="lt">$1,240</div>
        <div class="lrow"><span class="a">Claim #4471</span><span class="b">8 units</span></div>
      </div>`;
    E.linkscene.dataset.built='1';
  }
  function setLinkPhase(phase, forward){
    const ls=E.linkscene;
    const line=ls.querySelector('.line');
    // when not arriving forward, suppress the draw/snap transition so it snaps to rest
    if(forward===false && line){ line.style.transition='none'; void ls.offsetWidth; }
    else if(line){ line.style.transition=''; }
    ls.classList.remove('tied','cut');
    ls.classList.add(phase);
  }


  // ---- crack scene builder + runner ----
  function buildCrack(){
    if(E.crackscene.dataset.built) return;
    const bills=[
      {amt:'$1,240', dx:-150, r0:-8, r1:-22, d:0.0},
      {amt:'$880',  dx:40,   r0:6,  r1:18,  d:0.5},
      {amt:'$2,310', dx:-40,  r0:-3, r1:-10, d:1.0},
      {amt:'$640',  dx:130,  r0:10, r1:26,  d:1.5},
    ].map(b=>`<div class="bill" style="--dx:${b.dx}px;--r0:${b.r0}deg;--r1:${b.r1}deg;--d:${b.d}s">
        <div class="bt">Unpaid claim</div><div class="bv">${b.amt}</div></div>`).join('');
    E.crackscene.innerHTML=`
      <div class="floor"></div>
      <div class="glow"></div>
      <div class="crack"><svg viewBox="0 0 560 34" preserveAspectRatio="none">
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17
                 L510 18 L455 28 L400 16 L340 26 L285 12 L230 27 L175 15 L120 25 L70 19 L0 17 Z"
              fill="#0a0305"/>
        <path d="M0 17 L70 13 L120 20 L175 9 L230 22 L285 6 L340 21 L400 11 L455 23 L510 12 L560 17"
              fill="none" stroke="rgba(47,125,91,.35)" stroke-width="1"/>
      </svg></div>
      ${bills}`;
    E.crackscene.dataset.built='1';
  }
  function runCrack(forward){
    E.crackscene.classList.remove('run','rest');
    // force reflow so re-adding 'run' restarts the animation
    void E.crackscene.offsetWidth;
    if(forward){ E.crackscene.classList.add('run'); }
    else { E.crackscene.classList.add('rest'); }
  }

  // ---- the persistent claim card: built once, morphed per beat ----
  function buildClaim(){
    if(E.claimcard.dataset.built) return;
    E.claimcard.innerHTML=`
      <div class="card" id="claimCardEl">
        <div class="dust"></div>
        <div class="stamp" id="claimStamp">Denied</div>
        <div class="ct">Claim &middot; #4471</div>
        <div class="camt">$1,240</div>
        <div class="crow"><span class="clabel">Status</span><span class="cstatus" id="claimStatus">Submitted</span></div>
      </div>
      <div class="clock" id="claimClock">
        <div class="clockface"><div class="sweep" id="claimSweep"></div><div class="clockhand" id="claimHand"></div></div>
        <div class="clocklabel" id="claimClockLab">Day 1</div>
      </div>`;
    E.claimcard.dataset.built='1';
  }
  // phase: 'fresh' | 'aging' | 'problem' (clock + status + stamp + age handled here)
  function claimPhase(phase, opts){
    opts=opts||{};
    const card=document.getElementById('claimCardEl');
    const status=document.getElementById('claimStatus');
    const hand=document.getElementById('claimHand');
    const sweep=document.getElementById('claimSweep');
    const clockLab=document.getElementById('claimClockLab');
    const stamp=document.getElementById('claimStamp');
    card.classList.remove('aging','problem','lost','revived');
    // each beat = an angle. hand points there; sweep fills the arc up to there.
    const beat={ fresh:20, aging:220, problem:300 };
    const deg=beat[phase];
    // when not arriving forward (back-nav / jump), kill the transition so it snaps
    const fwd = opts.forward!==false;
    hand.style.transition  = fwd ? '' : 'none';
    sweep.style.transition = fwd ? '' : 'none';
    hand.style.transform='translate(-50%,-100%) rotate('+deg+'deg)';
    sweep.style.setProperty('--swept', deg+'deg');
    if(!fwd){ // force the snap to commit, then restore transitions for the next forward move
      void hand.offsetWidth; hand.style.transition=''; sweep.style.transition=''; }
    if(phase==='fresh'){ status.textContent='Submitted'; clockLab.textContent='Day 1'; }
    if(phase==='aging'){ card.classList.add('aging'); status.textContent='Unpaid \u00b7 unnoticed'; clockLab.textContent='Day 45'; }
    if(phase==='problem'){ card.classList.add('problem'); status.textContent='No reply \u00b7 70 days'; stamp.textContent=opts.stamp||'No reply'; clockLab.textContent='Day 70'; }
  }

  function buildAging(){
    if(E.aging.dataset.built) return;
    E.aging.innerHTML=`
      <div class="agrow">
        <div class="agname">Claim #4471 &middot; <b>$1,240</b></div>
        <div class="agout">harder to recover every week</div>
      </div>
      <div class="agtrack">
        <div class="agfill"></div>
        <div class="aglost">Still recoverable</div>
      </div>
      <div class="agaxis"><span>Fresh</span><span>Harder to recover</span><span>Harder still</span></div>
      <div class="agnote">No reply doesn't mean lost. <span class="ok">If they never answered, you can still call on it &mdash; sometimes even past the usual filing window.</span> But every week it sits, <span class="bad">it only gets harder to chase down.</span></div>`;
    E.aging.dataset.built='1';
  }
  function runAging(forward){
    const fill=E.aging.querySelector('.agfill');
    const lost=E.aging.querySelector('.aglost');
    const note=E.aging.querySelector('.agnote');
    if(forward){
      fill.style.transitionDuration='0s'; fill.style.width='0'; lost.classList.remove('show'); note.classList.remove('in');
      later(()=>{ fill.style.transitionDuration='2.6s'; fill.style.width='100%'; }, 80);
      later(()=>lost.classList.add('show'), 2000);
      later(()=>note.classList.add('in'), 1600);
    } else {
      fill.style.transitionDuration='0s'; fill.style.width='100%'; lost.classList.add('show'); note.classList.add('in');
    }
  }

  // ---- money count-up (kept from engine, unused here but harmless) ----
  const easeOut=p=>1-Math.pow(1-p,3);
  let moneyRAF=null;
  function countUp(node,peak){ cancelAnimationFrame(moneyRAF); let t0=null; const dur=1400;
    (function s(ts){ if(!t0)t0=ts; let p=Math.min(1,(ts-t0)/dur);
      node.textContent='$'+Math.round(peak*easeOut(p)).toLocaleString();
      if(p<1) moneyRAF=requestAnimationFrame(s);
    })(performance.now()); }



  // ---- controller: cancel pending timers on every change; pass direction so
  //      animations only play going FORWARD. Backward/jumps snap to resting state. ----
  let pendingTimers=[];
  function clearTimers(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[];
    cancelAnimationFrame(moneyRAF); }
  function later(fn,ms){ const t=setTimeout(fn,ms); pendingTimers.push(t); return t; }

  let i=-1;
  function go(n, forward){ if(n<0||n>=states.length) return;
    clearTimers(); i=n; states[i](forward);
    parent.postMessage({deck:1, type:'pos', idx:i, total:states.length}, '*');
  }
  function next(){ if(i<states.length-1){ go(i+1, true); } else { parent.postMessage({deck:1, type:'chapterEnd'}, '*'); } }
  function back(){ if(i>0){ go(i-1, false); } else { parent.postMessage({deck:1, type:'chapterStart'}, '*'); } }
  go(0);
  document.getElementById('click').addEventListener('click', next);
  stage.tabIndex=0;
  // parent drives navigation; listen for commands
  window.addEventListener('message', e=>{
    const m=e.data||{}; if(!m.deckcmd) return;
    if(m.deckcmd==='next') next();
    else if(m.deckcmd==='back') back();
    else if(m.deckcmd==='first') go(0, true);
    else if(m.deckcmd==='last') go(states.length-1, true);
  });
  // also allow local keys to bubble to parent for resilience
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); back(); }
    else if(e.key.toLowerCase()==='f'){ parent.postMessage({deck:1,type:'fs'},'*'); }
  });
})();

  #aging .agtrack{ position:relative; height:40px; border-radius:8px; background:rgba(255,255,255,.06);

  #claimcard{ z-index:4; width:520px; }

  /* claim card (the BILL) — right, plum-tinted */
  #linkscene .claim{ right:0; background:linear-gradient(150deg, rgba(155,123,212,.16), rgba(155,123,212,.06));
    border:1px solid rgba(155,123,212,.4); }

  #linkscene .claim .lrow .a{ color:var(--papmut); font-weight:600; } #linkscene .claim .lrow .b{ color:var(--paper); font-weight:700; }
  /* the connecting thread between them */

  #linkscene.tied .thread .line{ stroke-dashoffset:0; }

  #linkscene.tied .thread .knot{ opacity:1; }

  #linkscene.cut .thread .line{ opacity:0; }

  #ticks{ position:absolute; left:90px; bottom:74px; display:flex; gap:16px; align-items:center; z-index:5; }

    transition:background .5s, box-shadow .5s, transform .4s; }

  #counter{ position:absolute; right:90px; bottom:70px; font-family:var(--head); font-weight:700;
